<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/826/826070.png">
    <title>日本自助助手 Pro - 繁體版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-img: none; --text-color: #ffffff; --card-bg: rgba(255, 255, 255, 0.12);
            --sub-text: rgba(255, 255, 255, 0.6); --tab-bg: rgba(0, 0, 0, 0.8); --glass-blur: 40px; 
        }
        body, html { 
            height: 100%; margin: 0; overflow: hidden; background: #000; max-width: 500px; margin: 0 auto; 
            color: var(--text-color); 
            /* 繁體中文字體優化 */
            font-family: "SF Pro Display", "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; background-image: var(--bg-img); background-size: cover; background-position: center; z-index: 1; transition: background-image 0.6s ease; }
        .content-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; overflow-y: auto; padding-top: env(safe-area-inset-top); }
        .page { display: none; opacity: 0; transition: opacity 0.4s ease; padding-bottom: 140px; }
        .page.active { display: block; opacity: 1; }
        .card-frosted { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(var(--glass-blur)) saturate(160%); -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%); box-shadow: 0 15px 35px rgba(0,0,0,0.4); border-radius: 30px; }
        .tab-bar { background: var(--tab-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* 鎖屏模式字體加粗 */
        #lock-time { font-size: 6.5rem; font-weight: 800; letter-spacing: -3px; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #lock-date { text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .lock-weather-card { margin-top: 50px; background: rgba(0, 0, 0, 0.3); padding: 20px 35px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.15); display: flex; align-items: center; gap: 20px; backdrop-filter: blur(15px); }
        
        .lock-screen-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,0.1); display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 100px; }
        .lock-screen-overlay.active { display: flex; animation: lockFadeIn 0.3s ease-out; }
        @keyframes lockFadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
        
        #search-bar { height: 0; overflow: hidden; transition: all 0.3s ease; }
        #search-bar.open { height: 70px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="bg-layer" id="main-bg"></div>

    <div id="lock-screen" class="lock-screen-overlay" onclick="toggleLockScreen()">
        <p id="lock-time" class="text-white">00:00</p>
        <p id="lock-date" class="text-2xl font-bold mt-2 text-white">日期讀取中</p>
        <div class="lock-weather-card">
            <img id="lock-w-icon" src="" class="w-20 h-20">
            <div class="text-white text-left">
                <p id="lock-w-temp" class="text-5xl font-black">--°</p>
                <p id="lock-w-desc" class="font-bold text-lg">讀取中</p>
            </div>
        </div>
        <p id="lock-tz" class="mt-8 text-[11px] text-white opacity-60 font-black tracking-[0.25em] uppercase"></p>
    </div>

    <div class="content-layer" id="ui-layer">
        <div id="home-page" class="page active">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h1 class="text-3xl font-black italic tracking-tighter" style="color: var(--text-color);">JAPAN GO</h1>
                <div class="flex items-center space-x-3">
                    <button onclick="toggleLockScreen()" class="text-[11px] bg-white text-black font-black px-4 py-2 rounded-full shadow-lg">預覽</button>
                    <label class="text-[11px] font-black bg-white/10 px-4 py-2 rounded-full border border-white/10" style="color: var(--text-color);">
                        更換圖片 <input type="file" id="bg-upload" accept="image/*" class="hidden">
                    </label>
                </div>
            </header>
            <main class="p-6 space-y-6">
                <section class="card-frosted p-10">
                    <p class="text-[11px] font-black text-center tracking-[0.4em] opacity-50 mb-8" style="color: var(--text-color);">台幣 ⮕ 日圓 (TWD-JPY)</p>
                    <div class="flex items-center justify-center space-x-2">
                        <span class="text-2xl font-bold opacity-40">$</span>
                        <input type="number" id="twd-input" placeholder="0" inputmode="decimal" class="text-6xl font-black w-full text-center bg-transparent outline-none">
                    </div>
                    <div class="text-center mt-8">
                        <div class="text-6xl font-black text-blue-500">¥ <span id="jpy-output">0</span></div>
                        <p id="rate-info" class="text-[10px] opacity-40 mt-5 font-bold" style="color: var(--text-color);"></p>
                    </div>
                </section>
                <div class="grid grid-cols-2 gap-4">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted p-7 flex flex-col items-center">
                        <i class="fa-solid fa-train-subway text-orange-400 text-3xl mb-4"></i>
                        <span class="font-bold text-xs" style="color: var(--text-color);">交通乘換查詢</span>
                    </a>
                    <a href="https://www.google.com/maps" target="_blank" class="card-frosted p-7 flex flex-col items-center">
                        <i class="fa-solid fa-map-location-dot text-blue-400 text-3xl mb-4"></i>
                        <span class="font-bold text-xs" style="color: var(--text-color);">Google 地圖</span>
                    </a>
                </div>
            </main>
        </div>

        <div id="weather-page" class="page">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h2 class="text-2xl font-black italic" style="color: var(--text-color);">精準氣象</h2>
                <div class="flex space-x-2">
                    <button onclick="document.getElementById('search-bar').classList.toggle('open')" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/10" style="color: var(--text-color);">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <button onclick="getGPS()" class="text-[11px] bg-white text-black font-black px-4 py-2 rounded-full shadow-lg">更新位置</button>
                </div>
            </header>
            
            <div class="px-6">
                <div id="search-bar" class="card-frosted flex items-center px-4">
                    <input type="text" id="city-search" placeholder="搜尋全球城市/鄉鎮..." class="w-full p-2 bg-transparent font-bold text-white outline-none">
                    <button onclick="searchCity()" class="ml-2 font-black text-blue-400">搜尋</button>
                </div>

                <div class="space-y-6">
                    <div class="card-frosted p-10 text-center">
                        <p class="text-[10px] font-black opacity-50 uppercase tracking-[0.3em] mb-2" style="color: var(--text-color);">目前行政區定位</p>
                        <p id="g-city" class="text-3xl font-black mb-6" style="color: var(--text-color);">讀取中...</p>
                        <div class="flex justify-between items-center">
                            <p id="g-temp" class="text-8xl font-black tracking-tighter" style="color: var(--text-color);">--°</p>
                            <img id="g-icon" src="" class="w-28 h-28">
                        </div>
                        <p id="g-desc" class="text-sky-400 font-black mt-4 text-xl">--</p>
                    </div>
                    
                    <p class="text-[11px] font-black tracking-[0.3em] opacity-40 ml-2 uppercase" style="color: var(--text-color);">鄰近縣市鄉鎮天氣</p>
                    <div class="space-y-4" id="nearby-list"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-8 left-0 right-0 z-50 px-10">
        <div class="tab-bar rounded-full p-2.5 flex justify-around items-center max-w-xs mx-auto shadow-2xl">
            <button onclick="showPage('home-page')" id="tab-home" class="flex-1 py-4 text-white"><i class="fa-solid fa-plane-departure text-xl"></i></button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="flex-1 py-4 text-white/30"><i class="fa-solid fa-cloud-sun text-xl"></i></button>
        </div>
    </footer>

    <script>
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 4.75;

        // 背景處理
        const bgUpload = document.getElementById('bg-upload');
        const savedBg = localStorage.getItem('user_bg_img');
        if (savedBg) applyBg(savedBg);
        bgUpload.addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => { applyBg(ev.target.result); localStorage.setItem('user_bg_img', ev.target.result); };
            reader.readAsDataURL(e.target.files[0]);
        });

        function applyBg(src) {
            document.documentElement.style.setProperty('--bg-img', `url(${src})`);
            const img = new Image(); img.src = src;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 1, 1); const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const brightness = Math.sqrt(0.299*(r*r) + 0.587*(g*g) + 0.114*(b*b));
                const root = document.documentElement;
                if (brightness > 155) {
                    root.style.setProperty('--text-color', '#000'); root.style.setProperty('--card-bg', 'rgba(0,0,0,0.08)'); root.style.setProperty('--tab-bg', 'rgba(255,255,255,0.9)');
                } else {
                    root.style.setProperty('--text-color', '#fff'); root.style.setProperty('--card-bg', 'rgba(255,255,255,0.12)'); root.style.setProperty('--tab-bg', 'rgba(0,0,0,0.8)');
                }
            };
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-home').style.color = (id === 'home-page' ? '#fff' : 'rgba(255,255,255,0.3)');
            document.getElementById('tab-weather').style.color = (id === 'weather-page' ? '#fff' : 'rgba(255,255,255,0.3)');
            if(id === 'weather-page') getGPS();
        }

        // 匯率更新
        async function updateRate() {
            try { const r = await fetch('https://open.er-api.com/v6/latest/TWD'); const d = await r.json(); currentRate = d.rates.JPY; document.getElementById('rate-info').innerText = `即時匯率: 1 台幣 = ${currentRate.toFixed(2)} 日圓`; } catch(e) {}
        }
        document.getElementById('twd-input').oninput = e => { document.getElementById('jpy-output').innerText = e.target.value ? Math.round(e.target.value * currentRate).toLocaleString() : '0'; };

        // 精準天氣處理 (支援繁體中文位置)
        async function fetchWeather(lat, lon, city = '') {
            try {
                let preciseName = city;
                // 逆地理編碼獲取精準繁體行政區
                if (!city) {
                    const geoUrl = `https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${API_KEY}`;
                    const geoRes = await fetch(geoUrl);
                    const geoData = await geoRes.json();
                    if (geoData.length > 0) {
                        preciseName = geoData[0].local_names?.['zh'] || geoData[0].name;
                    }
                }

                let weatherUrl = `https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${API_KEY}&lang=zh_tw&` + (city ? `q=${city}` : `lat=${lat}&lon=${lon}`);
                const res = await fetch(weatherUrl);
                const d = await res.json();
                if(d.cod !== 200) return;

                const icon = `https://openweathermap.org/img/wn/${d.weather[0].icon}@4x.png`;
                const displayName = preciseName || d.name;
                
                document.getElementById('g-city').innerText = displayName;
                document.getElementById('g-temp').innerText = Math.round(d.main.temp) + '°';
                document.getElementById('g-icon').src = icon;
                document.getElementById('g-desc').innerText = d.weather[0].description;
                
                document.getElementById('lock-w-icon').src = icon;
                document.getElementById('lock-w-temp').innerText = Math.round(d.main.temp) + '°';
                document.getElementById('lock-w-desc').innerText = d.weather[0].description;
                document.getElementById('lock-tz').innerText = `${displayName} | 目前位置`;

                if(!city) fetchNearby(lat, lon); 
            } catch(e) { console.error(e); }
        }

        async function fetchNearby(lat, lon) {
            const url = `https://api.openweathermap.org/data/2.5/find?lat=${lat}&lon=${lon}&cnt=7&units=metric&appid=${API_KEY}&lang=zh_tw`;
            try {
                const res = await fetch(url);
                const d = await res.json();
                const list = document.getElementById('nearby-list');
                list.innerHTML = '';
                d.list.slice(1).forEach(item => {
                    list.innerHTML += `<div class="card-frosted p-6 flex justify-between items-center">
                        <span class="font-bold text-lg" style="color: var(--text-color);">${item.name}</span>
                        <div class="flex items-center space-x-4">
                            <span class="text-3xl font-black" style="color: var(--text-color);">${Math.round(item.main.temp)}°</span>
                            <img src="https://openweathermap.org/img/wn/${item.weather[0].icon}.png" class="w-10">
                        </div>
                    </div>`;
                });
            } catch(e) {}
        }

        function searchCity() { const c = document.getElementById('city-search').value; if(c) fetchWeather(null, null, c); document.getElementById('search-bar').classList.remove('open'); }
        function getGPS() { 
            document.getElementById('g-city').innerText = "精準定位中...";
            navigator.geolocation.getCurrentPosition(
                p => fetchWeather(p.coords.latitude, p.coords.longitude),
                e => { alert("請允許精確位置權限"); },
                { enableHighAccuracy: true }
            ); 
        }

        function toggleLockScreen() {
            const ls = document.getElementById('lock-screen');
            const isActive = ls.classList.toggle('active');
            if(isActive) { updateTime(); document.getElementById('ui-layer').style.display = 'none'; document.querySelector('footer').style.opacity = '0'; }
            else { document.getElementById('ui-layer').style.display = 'block'; document.querySelector('footer').style.opacity = '1'; }
        }

        function updateTime() {
            const n = new Date(); document.getElementById('lock-time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            document.getElementById('lock-date').innerText = `${n.getMonth()+1}月${n.getDate()}日 ${days[n.getDay()]}`;
        }
        setInterval(updateTime, 1000);

        updateRate();
        showPage('home-page');
    </script>
</body>
</html>
