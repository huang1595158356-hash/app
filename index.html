<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JP Tech v3.9 - 精準定位版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --bg-img: none; --text-color: #ffffff; 
            --card-bg: rgba(20, 20, 20, 0.45); 
            --tab-bg: rgba(15, 15, 15, 0.95); 
            --glass-blur: 45px; 
            --base-bg: #050505;
        }
        
        body.light-mode {
            --text-color: #1a1a1a;
            --card-bg: rgba(245, 245, 245, 0.75);
            --tab-bg: rgba(255, 255, 255, 0.98);
            --base-bg: #f0f2f5;
        }

        body, html { 
            height: 100%; margin: 0; overflow: hidden; background: var(--base-bg); max-width: 500px; margin: 0 auto; 
            color: var(--text-color); 
            font-family: "Inter", "PingFang TC", "Microsoft JhengHei", sans-serif;
            transition: background 0.5s ease;
        }

        .bg-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--base-bg); background-image: var(--bg-img); 
            background-size: cover; background-position: center; 
            z-index: 1; transition: filter 0.5s ease;
        }

        .content-layer { position: relative; width: 100%; height: 100%; z-index: 2; overflow: hidden; }
        
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; overflow-y: auto; 
            padding-top: env(safe-area-inset-top); padding-bottom: 140px;
        }
        .page.active { display: flex; animation: pageFade 0.4s ease-out; }
        @keyframes pageFade { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        .card-frosted { 
            background: var(--card-bg) !important;
            backdrop-filter: blur(var(--glass-blur)) saturate(110%) brightness(105%) !important;
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(110%) brightness(105%) !important;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            margin-bottom: 20px;
        }

        #lock-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; 
            background: rgba(0,0,0,0.7); display: none; flex-direction: column; 
            padding: 80px 40px; backdrop-filter: blur(80px) brightness(60%); -webkit-backdrop-filter: blur(80px);
        }
        #lock-screen.active { display: flex; }

        .vertical-text { writing-mode: vertical-rl; text-orientation: mixed; }
    </style>
</head>
<body class="dark-mode">
    <div class="bg-layer" id="main-bg"></div>

    <div id="lock-screen" onclick="toggleLockScreen()">
        <div class="flex justify-between items-start w-full">
            <div class="flex flex-col">
                <p id="lock-time" class="text-7xl font-black text-white tracking-tighter leading-none">00:00</p>
                <div class="flex items-center gap-3 mt-4">
                    <span class="bg-sky-500 text-white text-[10px] px-2 py-0.5 font-black rounded italic">GMT+8</span>
                    <p id="lock-date" class="text-lg font-bold text-white/60">日期載入中</p>
                </div>
            </div>
            <div class="vertical-text text-white/20 font-black tracking-widest text-sm uppercase italic">Precise Geo-Sync</div>
        </div>

        <div class="mt-auto w-full">
            <div class="card-frosted p-8 border-l-4 border-sky-500">
                <div class="flex justify-between items-end">
                    <div>
                        <p id="lock-city" class="text-xs font-black opacity-40 mb-1 uppercase tracking-widest italic">正在鎖定座標...</p>
                        <p id="lock-w-desc" class="text-2xl font-black text-white">等待同步...</p>
                    </div>
                    <div id="lock-w-icon-box" class="text-5xl mb-1"></div>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-6 border-t border-white/5 pt-4">
                    <div class="text-[11px] text-white/50 font-bold">溫度: <span id="lock-w-temp" class="text-white">--</span></div>
                    <div class="text-[11px] text-white/50 font-bold">降雨機率: <span id="lock-w-pop" class="text-white">--</span></div>
                </div>
            </div>
            <p class="text-center text-[10px] font-black opacity-30 mt-6 tracking-[0.5em] uppercase">Click to Unlock</p>
        </div>
    </div>

    <div class="content-layer" id="ui-layer">
        <div id="home-page" class="page active">
            <header class="p-8 pt-14 flex justify-between items-center">
                <h1 class="text-3xl font-black italic tracking-tighter">JP-TECH</h1>
                <div class="flex items-center space-x-2">
                    <button onclick="toggleLockScreen()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-sm border border-white/10 active:scale-90"><i class="fa-solid fa-expand"></i></button>
                    <button onclick="toggleTheme()" id="theme-btn" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-base border border-white/10 active:scale-90"><i class="fa-solid fa-moon"></i></button>
                    <label class="text-[10px] font-black bg-white/5 px-4 py-3 rounded-full border border-white/10">背景<input type="file" id="bg-upload" accept="image/*" class="hidden"></label>
                </div>
            </header>
            
            <main class="px-6">
                <section class="card-frosted p-10 text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-sky-500"></div>
                    <p class="text-[10px] font-black tracking-[0.6em] opacity-30 mb-8 uppercase">Live Exchange Rate</p>
                    <div class="flex items-center justify-center">
                        <input type="number" id="twd-input" placeholder="TWD" inputmode="decimal" class="text-6xl font-black w-full text-center bg-transparent outline-none">
                    </div>
                    <div class="mt-8 text-5xl font-black text-sky-500">¥ <span id="jpy-output">0</span></div>
                    <p id="rate-info" class="text-[10px] opacity-40 mt-5 font-bold uppercase"></p>
                </section>
                
                <div class="grid grid-cols-2 gap-4 mt-2">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted p-8 flex flex-col items-center group">
                        <i class="fa-solid fa-route text-orange-400 text-2xl mb-3"></i>
                        <span class="font-bold text-[10px] uppercase tracking-widest">乘換案內</span>
                    </a>
                    <a href="https://maps.google.com" target="_blank" class="card-frosted p-8 flex flex-col items-center group">
                        <i class="fa-solid fa-location-crosshairs text-blue-400 text-2xl mb-3"></i>
                        <span class="font-bold text-[10px] uppercase tracking-widest">精確導航</span>
                    </a>
                </div>
            </main>
        </div>

        <div id="weather-page" class="page">
            <header class="p-8 pt-14 flex justify-between items-center">
                <h2 class="text-2xl font-black italic tracking-widest text-sky-500">WEATHER</h2>
                <button onclick="fetchAllWeather()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 active:rotate-180 transition-transform"><i class="fa-solid fa-sync-alt"></i></button>
            </header>
            <div id="weather-content" class="px-6 pb-24 space-y-4"></div>
        </div>
    </div>

    <footer class="fixed bottom-10 left-0 right-0 z-50 px-10">
        <div class="tab-bar rounded-2xl p-2.5 flex justify-around items-center max-w-[260px] mx-auto shadow-2xl">
            <button onclick="showPage('home-page')" id="tab-home" class="flex-1 py-4 text-sky-500"><i class="fa-solid fa-compass text-xl"></i></button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="flex-1 py-4 opacity-30"><i class="fa-solid fa-wind text-xl"></i></button>
        </div>
    </footer>

    <script>
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 4.75;

        // 全面性的翻譯地圖 (備援機制)
        const geoTranslation = {
            'Kaohsiung': '高雄', 'Taipei': '台北', 'New Taipei City': '新北', 'Taichung': '台中', 
            'Tainan': '台南', 'Taoyuan': '桃園', 'Hsinchu': '新竹', 'Keelung': '基隆', 
            'Chiayi': '嘉義', 'Changhua': '彰化', 'Pingtung': '屏東', 'Pingtung City': '屏東市',
            'Chaozhou Township': '潮州', 'Chaozhou': '潮州', 'Tokyo': '東京', 'Osaka': '大阪'
        };

        // 新增：高精確度地名獲取函式
        async function getPreciseLocationName(lat, lon) {
            try {
                const geoUrl = `https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${API_KEY}`;
                const res = await fetch(geoUrl);
                const data = await res.json();
                if (data && data[0]) {
                    // 優先使用繁體中文地名
                    const name = data[0].local_names?.zh || data[0].name;
                    return geoTranslation[name] || name;
                }
            } catch (e) { console.error("Geo Error", e); }
            return null;
        }

        function applyBg(src) { 
            document.documentElement.style.setProperty('--bg-img', `url(${src})`);
            document.body.classList.remove('light-mode');
            localStorage.setItem('theme', 'dark'); 
        }

        function toggleTheme() {
            const body = document.body;
            const isLight = !body.classList.contains('light-mode');
            body.classList.toggle('light-mode', isLight);
            document.getElementById('theme-btn').innerHTML = isLight ? '<i class="fa-solid fa-sun text-orange-500"></i>' : '<i class="fa-solid fa-moon text-sky-300"></i>';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        document.getElementById('bg-upload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => { applyBg(ev.target.result); localStorage.setItem('user_bg_img', ev.target.result); };
            reader.readAsDataURL(e.target.files[0]);
        });

        const savedBg = localStorage.getItem('user_bg_img');
        if (savedBg) document.documentElement.style.setProperty('--bg-img', `url(${savedBg})`);

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-home').classList.toggle('opacity-30', id !== 'home-page');
            document.getElementById('tab-weather').classList.toggle('opacity-30', id !== 'weather-page');
            if(id === 'weather-page') fetchAllWeather();
        }

        async function fetchAllWeather() {
            const container = document.getElementById('weather-content');
            container.innerHTML = `<div class="p-4 opacity-40 text-xs font-black italic animate-pulse">正在精確定位鄉鎮級座標...</div>`;
            
            navigator.geolocation.getCurrentPosition(async p => {
                try {
                    const lat = p.coords.latitude;
                    const lon = p.coords.longitude;
                    
                    // 核心修正：先獲取精確地名
                    const preciseName = await getPreciseLocationName(lat, lon);
                    
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${API_KEY}&lat=${lat}&lon=${lon}&lang=zh_tw`);
                    const d = await res.json();
                    
                    const finalName = preciseName || d.name; // 優先使用座標解析的地名
                    let html = generateWeatherCard(finalName, d, true);
                    
                    const cities = ['Tokyo', 'Osaka', 'Kyoto', 'Fukuoka', 'Sapporo'];
                    for(let city of cities) {
                        try {
                            const resC = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}&lang=zh_tw`);
                            const dc = await resC.json();
                            html += generateWeatherCard(geoTranslation[city] || city, dc);
                        } catch(e){}
                    }
                    container.innerHTML = html;
                    updateLockWeather(finalName, d); 
                } catch(e) { container.innerHTML = "數據加載失敗。"; }
            }, () => { container.innerHTML = "請開啟 GPS 權限獲取鄉鎮級定位。"; });
        }

        function generateWeatherCard(title, d, isMain = false) {
            const windDir = (deg) => {
                const arr = ["北","東北","東","東南","南","西南","西","西北"];
                return arr[Math.round(deg / 45) % 8];
            };
            return `
            <div class="card-frosted p-6 ${isMain ? 'border-l-4 border-sky-500' : ''}">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-[10px] font-black bg-sky-500/20 text-sky-400 px-2 py-0.5 rounded">${isMain ? '精準定位' : '日本地區'}</span>
                        <p class="text-2xl font-black mt-1">${title}</p>
                    </div>
                    <div class="text-4xl">${getWeatherIcon(d.weather[0].icon)}</div>
                </div>
                <div class="flex items-end gap-2 mt-2">
                    <span class="text-4xl font-black">${Math.round(d.main.temp)}°</span>
                    <span class="text-xs font-bold opacity-40 mb-1">${d.weather[0].description}</span>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-5">
                    <div class="bg-white/5 p-3 rounded-xl"><p class="text-[9px] font-black opacity-30 mb-1">風向</p><p class="text-xs font-black">${windDir(d.wind.deg)}風</p></div>
                    <div class="bg-white/5 p-3 rounded-xl"><p class="text-[9px] font-black opacity-30 mb-1">濕度</p><p class="text-xs font-black">${d.main.humidity}%</p></div>
                    <div class="bg-white/5 p-3 rounded-xl"><p class="text-[9px] font-black opacity-30 mb-1">雲量</p><p class="text-xs font-black">${d.clouds.all}%</p></div>
                </div>
            </div>`;
        }

        function updateLockWeather(cityName, d) {
            document.getElementById('lock-city').innerText = cityName;
            document.getElementById('lock-w-desc').innerText = d.weather[0].description;
            document.getElementById('lock-w-temp').innerText = Math.round(d.main.temp) + '°C';
            document.getElementById('lock-w-pop').innerText = d.clouds.all + '%';
            document.getElementById('lock-w-icon-box').innerHTML = getWeatherIcon(d.weather[0].icon);
        }

        function getWeatherIcon(code) {
            const isNight = code.endsWith('n');
            const c = code.substring(0, 2);
            switch(c) {
                case '01': return isNight ? '<i class="fa-solid fa-moon text-yellow-200"></i>' : '<i class="fa-solid fa-sun text-orange-400"></i>';
                case '02': return isNight ? '<i class="fa-solid fa-cloud-moon text-blue-200"></i>' : '<i class="fa-solid fa-cloud-sun text-orange-200"></i>';
                case '09': case '10': return '<i class="fa-solid fa-cloud-showers-water text-sky-400"></i>';
                case '13': return '<i class="fa-solid fa-snowflake text-white"></i>';
                default: return '<i class="fa-solid fa-cloud opacity-40"></i>';
            }
        }

        async function updateRate() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/TWD'); const d = await r.json();
                currentRate = d.rates.JPY; document.getElementById('rate-info').innerText = `1 TWD = ${currentRate.toFixed(2)} JPY`;
            } catch(e) { }
        }
        document.getElementById('twd-input').oninput = e => { document.getElementById('jpy-output').innerText = e.target.value ? Math.round(e.target.value * currentRate).toLocaleString() : '0'; };
        function toggleLockScreen() { document.getElementById('lock-screen').classList.toggle('active'); updateTime(); }
        function updateTime() {
            const n = new Date();
            document.getElementById('lock-time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            document.getElementById('lock-date').innerText = `${n.getMonth()+1}月${n.getDate()}日 ${days[n.getDay()]}`;
        }
        setInterval(updateTime, 1000); updateRate(); showPage('home-page');
    </script>
</body>
</html>
