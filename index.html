<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日本自助助手 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 全域背景與毛玻璃核心設定 */
        :root { --bg-img: url('https://images.unsplash.com/photo-1542640244-7e672d6cef21?q=80&w=1000'); }
        
        body, html { height: 100%; margin: 0; overflow: hidden; background: #000; }
        
        /* 底層背景圖 */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-img); background-size: cover; background-position: center;
            z-index: 1; transform: scale(1.1); /* 稍微放大防止邊緣空白 */
        }

        /* 毛玻璃覆蓋層 (全頁面核心) */
        .glass-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            z-index: 2; overflow-y: auto; /* 允許內容捲動 */
            color: #fff;
        }

        /* 內容樣式微調 */
        .page { display: none; opacity: 0; transition: opacity 0.4s ease; padding-bottom: 100px; }
        .page.active { display: block; opacity: 1; }
        
        /* 霧面卡片 */
        .card-frosted { 
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }

        /* 自訂圖示 */
        .weather-icon-lg { filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }

        /* 滑桿與按鈕自訂 */
        input[type="number"] { background: transparent; color: #fff; }
        input[type="number"]::placeholder { color: rgba(255,255,255,0.5); }
        
        /* 底部導覽列毛玻璃 */
        .tab-bar-glass {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="bg-layer" id="main-bg"></div>

    <div class="glass-layer">
        
        <div id="home-page" class="page active">
            <header class="p-6 pt-10 flex justify-between items-center sticky top-0 z-10">
                <h1 class="text-3xl font-black italic tracking-tighter text-white drop-shadow-lg">JAPAN GO</h1>
                <label for="bg-upload" class="text-xl opacity-70 active:opacity-100 cursor-pointer p-2">
                    <i class="fa-solid fa-image"></i>
                    <input type="file" id="bg-upload" accept="image/*" class="hidden">
                </label>
            </header>

            <main class="p-6 space-y-6">
                <section class="card-frosted rounded-3xl p-6 transition-all hover:scale-[1.02]">
                    <p class="text-xs font-bold text-white/70 mb-5 text-center italic tracking-widest">EXCHANGE RATE (JPY ⮕ TWD)</p>
                    <div class="flex items-center space-x-3 mb-5 border-b-2 border-white/20 pb-2">
                        <span class="text-4xl font-bold text-white/30">¥</span>
                        <input type="number" id="jpy" class="w-full text-5xl font-bold outline-none text-center" placeholder="0" inputmode="decimal">
                    </div>
                    <div class="flex flex-col items-center justify-center pt-2">
                        <span class="text-sm text-white/60 mb-2">約等於</span>
                        <div class="text-6xl font-black text-red-400 drop-shadow-lg">NT$ <span id="twd">0</span></div>
                        <p id="rate-info" class="text-[11px] text-white/40 mt-4 italic">載入最新匯率中...</p>
                    </div>
                </section>

                <div class="grid grid-cols-2 gap-4">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted rounded-2xl p-6 flex flex-col items-center active:scale-95 transition-transform">
                        <i class="fa-solid fa-train-subway text-orange-400 text-3xl mb-3"></i>
                        <span class="font-bold text-sm text-white/90">交通查詢</span>
                    </a>
                    <a href="https://www.google.com/maps" target="_blank" class="card-frosted rounded-2xl p-6 flex flex-col items-center active:scale-95 transition-transform">
                        <i class="fa-solid fa-map-location-dot text-blue-400 text-3xl mb-3"></i>
                        <span class="font-bold text-sm text-white/90">Google Map</span>
                    </a>
                </div>
            </main>
        </div>

        <div id="weather-page" class="page min-h-screen">
            <header class="p-6 pt-10 flex justify-between items-center sticky top-0 z-10">
                <h2 class="text-2xl font-black text-white italic drop-shadow-lg"><i class="fa-solid fa-cloud mr-2"></i>氣象中心</h2>
                <button onclick="getGPS()" class="text-xs bg-white text-slate-900 font-bold px-5 py-2 rounded-full shadow-lg active:scale-90 transition-transform">
                    <i class="fa-solid fa-location-crosshairs mr-1"></i>全球定位
                </button>
            </header>

            <div class="p-6 space-y-6">
                <div class="card-frosted rounded-3xl p-7 shadow-xl relative overflow-hidden">
                    <div class="flex items-center space-x-2 mb-5">
                        <i class="fa-solid fa-location-dot text-sky-400 text-xl"></i>
                        <p id="g-city" class="text-xl font-bold text-white">載入位置中...</p>
                    </div>
                    <div class="flex items-end justify-between mb-6">
                        <div>
                            <p id="g-temp" class="text-8xl font-black tracking-tighter drop-shadow-lg">--°</p>
                            <p id="g-desc" class="text-base font-medium text-sky-200 mt-1">正在等待衛星信號...</p>
                        </div>
                        <img id="g-icon" src="" alt="" class="w-28 h-28 -mb-4 -mr-4 weather-icon-lg">
                    </div>
                    <div id="g-details" class="mt-6 grid grid-cols-2 gap-x-8 gap-y-4 pt-6 border-t border-white/10 text-sm text-white/80 font-medium">
                        <p><i class="fa-solid fa-wind mr-2 w-5 text-sky-400"></i>風向: --</p>
                        <p><i class="fa-solid fa-sun mr-2 w-5 text-amber-400"></i>紫外線: --</p>
                        <p><i class="fa-solid fa-droplet mr-2 w-5 text-blue-400"></i>濕度: --%</p>
                        <p><i class="fa-solid fa-gauge mr-2 w-5 text-green-400"></i>氣壓: --hPa</p>
                    </div>
                </div>

                <h3 class="text-xs font-bold text-white/60 tracking-widest pt-5 px-2 uppercase"><i class="fa-solid fa-city mr-2"></i>日本主要城市</h3>
                <div id="city-list" class="grid grid-cols-2 gap-4">
                    <div class="card-frosted rounded-2xl p-5 transition-all hover:bg-white/20">
                        <p class="font-bold text-base text-white">東京 Tokyo</p>
                        <div class="flex items-center justify-between mt-3">
                            <p id="t-Tokyo" class="text-4xl font-black drop-shadow-md">--°</p>
                            <img id="i-Tokyo" src="" alt="" class="w-12 h-12">
                        </div>
                        <p id="d-Tokyo" class="text-xs text-white/70 mt-2 font-medium">讀取中</p>
                    </div>
                    <div class="card-frosted rounded-2xl p-5 transition-all hover:bg-white/20">
                        <p class="font-bold text-base text-white">大阪 Osaka</p>
                        <div class="flex items-center justify-between mt-3">
                            <p id="t-Osaka" class="text-4xl font-black drop-shadow-md">--°</p>
                            <img id="i-Osaka" src="" alt="" class="w-12 h-12">
                        </div>
                        <p id="d-Osaka" class="text-xs text-white/70 mt-2 font-medium">讀取中</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 p-5 z-50">
        <div class="tab-bar-glass rounded-full p-2.5 flex justify-around items-center max-w-sm mx-auto shadow-2xl">
            <button onclick="showPage('home-page')" id="tab-home" class="flex-1 flex flex-col items-center p-3.5 rounded-full text-white/50 active:scale-95 transition-all">
                <i class="fa-solid fa-plane-departure text-xl mb-1.5"></i>
                <span class="text-[11px] font-bold">旅遊工具</span>
            </button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="flex-1 flex flex-col items-center p-3.5 rounded-full text-white/50 active:scale-95 transition-all">
                <i class="fa-solid fa-cloud-sun text-xl mb-1.5"></i>
                <span class="text-[11px] font-bold">即時天氣</span>
            </button>
        </div>
    </footer>

    <script>
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 0.211;

        // --- 初始化背景圖片系統 ---
        const bgLayer = document.getElementById('main-bg');
        const bgUpload = document.getElementById('bg-upload');
        const savedBg = localStorage.getItem('user_bg_img');

        // 如果本地有存圖，優先讀取
        if (savedBg) {
            document.documentElement.style.setProperty('--bg-img', `url(${savedBg})`);
        }

        // 處理圖片上傳
        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Img = event.target.result;
                // 1. 套用新背景
                document.documentElement.style.setProperty('--bg-img', `url(${base64Img})`);
                // 2. 存入本地儲存區 (下次打開還在)
                try {
                    localStorage.setItem('user_bg_img', base64Img);
                } catch (error) {
                    alert("圖片檔案過大，無法儲存設定 (請上傳 2MB 以內圖片)");
                    console.error(error);
                }
            };
            reader.readAsDataURL(file);
        });


        // 頁面切換控制
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 更新底部圖標狀態
            const tabs = { 'home-page': 'tab-home', 'weather-page': 'tab-weather' };
            document.querySelectorAll('footer button').forEach(b => b.classList.remove('text-red-400', 'bg-white/10'));
            
            const activeTab = document.getElementById(tabs[pageId]);
            activeTab.classList.add('text-red-400', 'bg-white/10');

            if(pageId === 'weather-page') {
                updateCities();
                // 第一次進入天氣頁自動定位
                if(document.getElementById('g-city').innerText === "載入位置中...") getGPS();
            }
        }

        // 匯率系統
        async function updateRate() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/JPY');
                const d = await r.json();
                currentRate = d.rates.TWD;
                document.getElementById('rate-info').innerText = `即時匯率: 1 JPY = ${currentRate.toFixed(4)} TWD`;
            } catch(e) { console.error("匯率更新失敗"); }
        }
        document.getElementById('jpy').addEventListener('input', (e)=>{
            const val = e.target.value;
            document.getElementById('twd').innerText = val ? Math.round(val * currentRate).toLocaleString() : '0';
        });

        // 天氣 API 核心
        async function fetchWeatherDetail(city, tId, dId, iId, lat, lon) {
            let url = `https://api.openweathermap.org/data/2.5/weather?q=${city},JP&units=metric&appid=${API_KEY}&lang=zh_tw`;
            if(lat && lon) url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}&lang=zh_tw`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.cod !== 200) throw new Error(data.message);
                
                // 基礎氣溫與圖標 (改成 @4x 更清晰)
                document.getElementById(tId).innerText = Math.round(data.main.temp) + '°';
                document.getElementById(dId).innerText = data.weather[0].description;
                const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;

                if(lat) {
                    // 全球定位卡片
                    document.getElementById('g-city').innerText = `${data.name}, ${data.sys.country}`;
                    document.getElementById('g-icon').src = iconUrl;
                    
                    const windDirs = ['北','東北','東','東南','南','西南','西','西北'];
                    const windStr = windDirs[Math.round(data.wind.deg/45)%8];
                    
                    // 抓取紫外線 UV (需要經緯度座標)
                    const uvRes = await fetch(`https://api.openweathermap.org/data/2.5/uvi?lat=${data.coord.lat}&lon=${data.coord.lon}&appid=${API_KEY}`);
                    const uvData = await uvRes.json();
                    
                    document.getElementById('g-details').innerHTML = `
                        <p><i class="fa-solid fa-wind mr-2 w-5 text-sky-300"></i>風向: ${windStr}風</p>
                        <p><i class="fa-solid fa-sun mr-2 w-5 text-amber-300"></i>紫外線: ${uvData.value}</p>
                        <p><i class="fa-solid fa-droplet mr-2 w-5 text-blue-300"></i>濕度: ${data.main.humidity}%</p>
                        <p><i class="fa-solid fa-gauge mr-2 w-5 text-green-300"></i>氣壓: ${data.main.pressure}hPa</p>
                    `;
                } else {
                    // 日本城市
                    document.getElementById(iId).src = iconUrl;
                }
            } catch(e) { console.error("天氣載入出錯:", e); }
        }

        function updateCities() {
            fetchWeatherDetail('Tokyo', 't-Tokyo', 'd-Tokyo', 'i-Tokyo');
            fetchWeatherDetail('Osaka', 't-Osaka', 'd-Osaka', 'i-Osaka');
        }

        function getGPS() {
            document.getElementById('g-city').innerText = "定位中...";
            document.getElementById('g-desc').innerText = "正在讀取 GPS 衛星訊號...";
            navigator.geolocation.getCurrentPosition(pos => {
                fetchWeatherDetail('', 'g-temp', 'g-desc', '', pos.coords.latitude, pos.coords.longitude);
            }, () => {
                document.getElementById('g-city').innerText = "定位失敗";
                document.getElementById('g-desc').innerText = "請確認開啟 GPS 權限";
            }, { timeout: 8000 });
        }

        // 初始化
        updateRate();
        showPage('home-page'); 
    </script>
</body>
</html>
