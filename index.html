<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>日本自助助手 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-img: none; /* 預設無圖片 */
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.1);
            --sub-text: rgba(255, 255, 255, 0.6);
            --tab-bg: rgba(0, 0, 0, 0.85);
        }
        
        body, html { height: 100%; margin: 0; overflow: hidden; background: #000; max-width: 500px; margin: 0 auto; color: var(--text-color); }
        
        /* 1. 背景層 - 預設黑色 */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            background-image: var(--bg-img); 
            background-size: cover; background-position: center center;
            z-index: 1; transition: background-image 0.5s ease;
        }

        /* 2. UI 層 */
        .content-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; overflow-y: auto; 
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
        }

        .page { display: none; opacity: 0; transition: opacity 0.4s ease; padding-bottom: 120px; }
        .page.active { display: block; opacity: 1; }

        /* 超強毛玻璃卡片 - 提升模糊度至 40px 確保閱讀性 */
        .card-frosted { 
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 28px;
        }

        input[type="number"] { background: transparent; color: var(--text-color); text-align: center; font-size: 3rem; font-weight: 900; }
        input[type="number"]::placeholder { color: var(--sub-text); }
        
        .tab-bar {
            background: var(--tab-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 鎖屏模式 */
        .lock-screen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; background: rgba(0,0,0,0.1); display: none;
            flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 80px; text-shadow: 0 2px 15px rgba(0,0,0,0.8);
        }
        .lock-screen-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-layer" id="main-bg"></div>

    <div id="lock-screen" class="lock-screen-overlay" onclick="toggleLockScreen()">
        <p id="lock-time" class="text-8xl font-thin tracking-tighter text-white">--:--</p>
        <p id="lock-date" class="text-xl font-light mt-2 text-white">日期讀取中</p>
        
        <div class="mt-12 bg-black/30 px-8 py-4 rounded-3xl border border-white/10 flex items-center space-x-4">
            <img id="lock-w-icon" src="" class="w-16 h-16">
            <div class="text-white text-left">
                <p id="lock-w-temp" class="text-4xl font-bold">--°</p>
                <p id="lock-w-desc" class="text-sm opacity-80">定位中...</p>
            </div>
        </div>
        <p id="lock-tz" class="mt-4 text-[10px] text-white/50 uppercase tracking-widest"></p>
        <p class="absolute bottom-20 text-[10px] text-white/40">點擊任意處返回</p>
    </div>

    <div class="content-layer" id="ui-layer">
        <div id="home-page" class="page active">
            <header class="p-6 pt-10 flex justify-between items-center">
                <h1 class="text-3xl font-black italic tracking-tighter">JAPAN GO</h1>
                <div class="flex items-center space-x-2">
                    <button onclick="toggleLockScreen()" class="text-[10px] bg-white text-black font-bold px-3 py-1.5 rounded-full">鎖屏</button>
                    <label class="text-[10px] font-bold bg-white/10 px-3 py-1.5 rounded-full" id="btn-bg-text">
                        更換圖片 <input type="file" id="bg-upload" accept="image/*" class="hidden">
                    </label>
                </div>
            </header>

            <main class="p-6 space-y-6">
                <section class="card-frosted p-8">
                    <p class="text-[10px] font-bold text-center tracking-[0.3em] opacity-60 mb-6">JPY ⮕ TWD</p>
                    <input type="number" id="jpy" placeholder="0" inputmode="decimal" class="w-full outline-none">
                    <div class="text-center mt-6">
                        <div class="text-6xl font-black text-red-500">NT$ <span id="twd">0</span></div>
                        <p id="rate-info" class="text-[10px] opacity-40 mt-4 italic"></p>
                    </div>
                </section>

                <div class="grid grid-cols-2 gap-4">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted p-6 flex flex-col items-center">
                        <i class="fa-solid fa-train-subway text-orange-400 text-3xl mb-3"></i>
                        <span class="font-bold text-xs opacity-90">交通查詢</span>
                    </a>
                    <a href="https://www.google.com/maps" target="_blank" class="card-frosted p-6 flex flex-col items-center">
                        <i class="fa-solid fa-map-location-dot text-blue-400 text-3xl mb-3"></i>
                        <span class="font-bold text-xs opacity-90">Google Map</span>
                    </a>
                </div>
            </main>
        </div>

        <div id="weather-page" class="page">
            <header class="p-6 pt-10 flex justify-between items-center">
                <h2 class="text-2xl font-black italic">天氣中心</h2>
                <button onclick="getGPS()" class="text-[10px] bg-white text-black font-bold px-4 py-1.5 rounded-full">更新位置</button>
            </header>
            <div class="p-6 space-y-6">
                <div class="card-frosted p-8">
                    <p id="g-city" class="text-xl font-bold mb-4">--</p>
                    <div class="flex justify-between items-end">
                        <p id="g-temp" class="text-8xl font-black tracking-tighter">--°</p>
                        <img id="g-icon" src="" class="w-24 h-24 -mr-4">
                    </div>
                    <p id="g-desc" class="text-sky-300 font-medium mt-2">--</p>
                </div>
                <div class="space-y-3" id="city-list">
                    <div class="card-frosted p-5 flex justify-between items-center">
                        <span class="font-bold">東京 Tokyo</span>
                        <div class="flex items-center space-x-3">
                            <span id="t-Tokyo" class="text-2xl font-black">--°</span>
                            <img id="i-Tokyo" src="" class="w-10">
                        </div>
                    </div>
                    <div class="card-frosted p-5 flex justify-between items-center">
                        <span class="font-bold">大阪 Osaka</span>
                        <div class="flex items-center space-x-3">
                            <span id="t-Osaka" class="text-2xl font-black">--°</span>
                            <img id="i-Osaka" src="" class="w-10">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-6 left-0 right-0 z-50 px-8">
        <div class="tab-bar rounded-full p-2 flex justify-around items-center max-w-xs mx-auto">
            <button onclick="showPage('home-page')" id="tab-home" class="flex-1 py-3 rounded-full text-white/40">
                <i class="fa-solid fa-plane text-xl"></i>
            </button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="flex-1 py-3 rounded-full text-white/40">
                <i class="fa-solid fa-sun text-xl"></i>
            </button>
        </div>
    </footer>

    <script>
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 0.211;

        // --- 背景與顏色系統 ---
        const bgUpload = document.getElementById('bg-upload');
        const savedBg = localStorage.getItem('user_bg_img');

        if (savedBg) applyBg(savedBg);

        bgUpload.addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => {
                applyBg(ev.target.result);
                localStorage.setItem('user_bg_img', ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function applyBg(src) {
            document.documentElement.style.setProperty('--bg-img', `url(${src})`);
            const img = new Image();
            img.src = src;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const brightness = Math.sqrt(0.299*(r*r) + 0.587*(g*g) + 0.114*(b*b));
                const root = document.documentElement;
                if (brightness > 160) {
                    root.style.setProperty('--text-color', '#000');
                    root.style.setProperty('--card-bg', 'rgba(0, 0, 0, 0.08)');
                    root.style.setProperty('--sub-text', 'rgba(0, 0, 0, 0.5)');
                    root.style.setProperty('--tab-bg', 'rgba(255, 255, 255, 0.9)');
                } else {
                    root.style.setProperty('--text-color', '#fff');
                    root.style.setProperty('--card-bg', 'rgba(255, 255, 255, 0.12)');
                    root.style.setProperty('--sub-text', 'rgba(255, 255, 255, 0.6)');
                    root.style.setProperty('--tab-bg', 'rgba(0, 0, 0, 0.85)');
                }
            };
        }

        // --- 頁面邏輯 ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('footer button').forEach(b => b.classList.replace('text-white', 'text-white/40'));
            document.getElementById(id === 'home-page' ? 'tab-home' : 'tab-weather').classList.replace('text-white/40', 'text-white');
            if(id === 'weather-page') { updateCities(); getGPS(); }
        }

        async function updateRate() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/JPY');
                const d = await r.json();
                currentRate = d.rates.TWD;
                document.getElementById('rate-info').innerText = `1 JPY = ${currentRate.toFixed(4)} TWD`;
            } catch(e) {}
        }

        document.getElementById('jpy').oninput = e => {
            document.getElementById('twd').innerText = e.target.value ? Math.round(e.target.value * currentRate).toLocaleString() : '0';
        };

        async function fetchWeather(city, tId, dId, iId, lat, lon) {
            let url = `https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${API_KEY}&lang=zh_tw&` + (lat ? `lat=${lat}&lon=${lon}` : `q=${city},JP`);
            try {
                const res = await fetch(url);
                const d = await res.json();
                const icon = `https://openweathermap.org/img/wn/${d.weather[0].icon}@4x.png`;
                if(lat) {
                    document.getElementById('g-city').innerText = d.name;
                    document.getElementById('g-temp').innerText = Math.round(d.main.temp) + '°';
                    document.getElementById('g-desc').innerText = d.weather[0].description;
                    document.getElementById('g-icon').src = icon;
                    document.getElementById('lock-w-icon').src = icon;
                    document.getElementById('lock-w-temp').innerText = Math.round(d.main.temp) + '°C';
                    document.getElementById('lock-w-desc').innerText = d.weather[0].description;
                    document.getElementById('lock-tz').innerText = `時區: UTC${d.timezone/3600>=0?'+':''}${d.timezone/3600} | ${d.name}`;
                } else {
                    document.getElementById(tId).innerText = Math.round(d.main.temp) + '°';
                    document.getElementById(iId).src = icon;
                }
            } catch(e) {}
        }

        function updateCities() { fetchWeather('Tokyo', 't-Tokyo', '', 'i-Tokyo'); fetchWeather('Osaka', 't-Osaka', '', 'i-Osaka'); }
        function getGPS() { navigator.geolocation.getCurrentPosition(p => fetchWeather('', '', '', '', p.coords.latitude, p.coords.longitude)); }

        function toggleLockScreen() {
            const ls = document.getElementById('lock-screen');
            const isActive = ls.classList.toggle('active');
            if(isActive) {
                updateTime();
                document.getElementById('ui-layer').style.display = 'none';
                document.querySelector('footer').style.display = 'none';
            } else {
                document.getElementById('ui-layer').style.display = 'block';
                document.querySelector('footer').style.display = 'block';
            }
        }

        function updateTime() {
            const n = new Date();
            document.getElementById('lock-time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            document.getElementById('lock-date').innerText = `${n.getMonth()+1}月${n.getDate()}日 ${['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][n.getDay()]}`;
        }
        setInterval(updateTime, 10000);

        updateRate();
        showPage('home-page');
    </script>
</body>
</html>
