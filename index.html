<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --bg-img: none; --text-color: #ffffff; --card-bg: rgba(255, 255, 255, 0.12);
            --tab-bg: rgba(0, 0, 0, 0.8); --glass-blur: 40px; --base-bg: #000;
        }
        
        /* 白晝模式變數覆蓋 */
        body.light-mode {
            --text-color: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.65);
            --tab-bg: rgba(255, 255, 255, 0.9);
            --base-bg: #f2f4f7;
        }

        body, html { 
            height: 100%; margin: 0; overflow: hidden; background: var(--base-bg); max-width: 500px; margin: 0 auto; 
            color: var(--text-color); 
            font-family: "SF Pro Display", "PingFang TC", "Microsoft JhengHei", sans-serif;
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
        }

        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--base-bg); background-image: var(--bg-img); background-size: cover; background-position: center; z-index: 1; transition: 0.6s ease; }
        .content-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; overflow-y: auto; padding-top: env(safe-area-inset-top); }
        .page { display: none; opacity: 0; transition: opacity 0.4s ease; padding-bottom: 140px; }
        .page.active { display: block; opacity: 1; }
        
        .card-frosted { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(var(--glass-blur)) saturate(160%); 
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border-radius: 30px; 
            transition: background 0.5s ease, transform 0.2s ease; 
        }

        .tab-bar { background: var(--tab-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(0,0,0,0.05); }
        
        /* 天氣向量圖標專屬色彩 */
        .w-color-sun { color: #ff9f43; filter: drop-shadow(0 0 8px rgba(255,159,67,0.5)); }
        .w-color-moon { color: #f6e05e; filter: drop-shadow(0 0 12px rgba(246,224,94,0.6)); }
        .w-color-cloud { color: #a5b1b2; }
        .w-color-rain { color: #3498db; }
        .w-color-bolt { color: #9b59b6; }
        .w-color-snow { color: #ffffff; filter: drop-shadow(0 0 5px rgba(255,255,255,0.8)); }

        #lock-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; 
            background: rgba(0,0,0,0.3); display: none; flex-direction: column; 
            align-items: center; justify-content: flex-start; padding-top: 100px; 
            backdrop-blur: 15px; -webkit-backdrop-blur: 15px;
        }
        #lock-screen.active { display: flex; animation: lockFadeIn 0.3s ease-out; }
        #lock-time { font-size: 6.5rem; font-weight: 800; letter-spacing: -3px; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.4); line-height: 1; }

        @keyframes lockFadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="dark-mode">
    <div class="bg-layer" id="main-bg"></div>

    <div id="lock-screen" onclick="toggleLockScreen()">
        <p id="lock-time">00:00</p>
        <p id="lock-date" class="text-2xl font-bold mt-2 text-white/90">日期讀取中</p>
        <div class="mt-12 bg-black/40 p-8 rounded-[40px] border border-white/10 flex items-center gap-6 backdrop-blur-2xl">
            <div id="lock-w-icon-box" class="text-7xl"></div>
            <div class="text-white">
                <p id="lock-w-temp" class="text-5xl font-black">--°</p>
                <p id="lock-w-desc" class="font-bold text-lg opacity-80">讀取中</p>
            </div>
        </div>
        <p class="absolute bottom-12 text-white/30 font-bold tracking-[0.5em] text-xs uppercase">點擊螢幕解鎖</p>
    </div>

    <div class="content-layer" id="ui-layer">
        <div id="home-page" class="page active">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h1 class="text-4xl font-black italic tracking-tighter">JP</h1>
                <div class="flex items-center space-x-3">
                    <button onclick="toggleTheme()" id="theme-btn" class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center text-xl shadow-lg border border-white/10 transition-all active:scale-90">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <label class="text-[11px] font-black bg-white/10 px-4 py-2.5 rounded-full border border-white/10 active:opacity-50">
                        背景 <input type="file" id="bg-upload" accept="image/*" class="hidden">
                    </label>
                    <button onclick="toggleLockScreen()" class="text-[11px] bg-sky-500 text-white font-black px-5 py-2.5 rounded-full shadow-lg active:scale-95 transition-transform">預覽</button>
                </div>
            </header>
            
            <main class="p-6 space-y-6">
                <section class="card-frosted p-10 text-center">
                    <p class="text-[10px] font-black tracking-[0.4em] opacity-40 mb-8 uppercase">TWD ⮕ JPY Exchange</p>
                    <div class="flex items-center justify-center space-x-2">
                        <span class="text-2xl font-bold opacity-20">$</span>
                        <input type="number" id="twd-input" placeholder="0" inputmode="decimal" class="text-6xl font-black w-full text-center bg-transparent outline-none">
                    </div>
                    <div class="mt-8">
                        <div class="text-6xl font-black text-sky-500">¥ <span id="jpy-output">0</span></div>
                        <p id="rate-info" class="text-[10px] opacity-40 mt-5 font-bold uppercase tracking-widest"></p>
                    </div>
                </section>

                <div class="grid grid-cols-2 gap-4">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted p-8 flex flex-col items-center group">
                        <i class="fa-solid fa-train-subway text-orange-400 text-3xl mb-4 group-active:scale-110 transition-transform"></i>
                        <span class="font-bold text-xs uppercase tracking-widest">交通查詢</span>
                    </a>
                    <a href="https://maps.google.com" target="_blank" class="card-frosted p-8 flex flex-col items-center group">
                        <i class="fa-solid fa-map-location-dot text-blue-400 text-3xl mb-4 group-active:scale-110 transition-transform"></i>
                        <span class="font-bold text-xs uppercase tracking-widest">地圖導航</span>
                    </a>
                </div>
                <button onclick="resetSettings()" class="w-full py-4 text-[10px] font-bold opacity-30 uppercase tracking-[0.4em]">重置所有設定</button>
            </main>
        </div>

        <div id="weather-page" class="page">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h2 class="text-2xl font-black italic tracking-widest uppercase">Weather</h2>
                <button onclick="fetchAllWeather()" class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center border border-white/10 active:rotate-180 transition-transform duration-500">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </header>
            
            <div class="px-6 space-y-4 pb-10">
                <div class="card-frosted p-8 border-l-8 border-sky-400">
                    <p class="text-[10px] font-black opacity-40 uppercase tracking-widest mb-2">GPS Location</p>
                    <div class="flex justify-between items-center">
                        <div>
                            <p id="g-city" class="text-2xl font-black italic">定位中...</p>
                            <p id="g-desc" class="text-sky-500 font-bold text-sm uppercase tracking-tight">--</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span id="g-temp" class="text-5xl font-black tracking-tighter">--°</span>
                            <div id="g-icon-box" class="text-5xl"></div>
                        </div>
                    </div>
                </div>

                <div id="city-list" class="space-y-3">
                    </div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-8 left-0 right-0 z-50 px-10">
        <div class="tab-bar rounded-full p-2.5 flex justify-around items-center max-w-xs mx-auto shadow-2xl">
            <button onclick="showPage('home-page')" id="tab-home" class="flex-1 py-4 text-sky-500"><i class="fa-solid fa-house-chimney text-xl"></i></button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="flex-1 py-4 opacity-30"><i class="fa-solid fa-cloud-sun text-xl"></i></button>
        </div>
    </footer>

    <script>
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 4.75;
        const cities = ['Tokyo', 'Osaka', 'Kyoto', 'Fukuoka', 'Sapporo'];
        const nameMap = { 'Tokyo': '東京', 'Osaka': '大阪', 'Kyoto': '京都', 'Fukuoka': '福岡', 'Sapporo': '札幌' };

        // 1. 初始化城市列表 UI
        const cityList = document.getElementById('city-list');
        cities.forEach(c => {
            cityList.innerHTML += `
                <div class="card-frosted p-6 flex justify-between items-center">
                    <span class="font-black text-lg italic uppercase tracking-tighter">${nameMap[c]}</span>
                    <div class="flex items-center gap-5">
                        <span id="temp-${c.toLowerCase()}" class="font-black text-2xl tracking-tighter">--°</span>
                        <div id="icon-${c.toLowerCase()}-box" class="text-3xl w-10 text-center"></div>
                    </div>
                </div>
            `;
        });

        // 2. 模式切換 (白晝/黑夜)
        function toggleTheme(force = null) {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            const isLight = force !== null ? force : !body.classList.contains('light-mode');
            
            if (isLight) {
                body.classList.add('light-mode');
                btn.innerHTML = '<i class="fa-solid fa-sun text-orange-500"></i>';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-mode');
                btn.innerHTML = '<i class="fa-solid fa-moon text-sky-300"></i>';
                localStorage.setItem('theme', 'dark');
            }
        }

        // 判斷初始模式
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') toggleTheme(true);
        else if (savedTheme === 'dark') toggleTheme(false);
        else toggleTheme(new Date().getHours() >= 6 && new Date().getHours() < 18);

        // 3. 向量天氣圖標邏輯 (高解析)
        function getWeatherIconHTML(iconCode) {
            const isNight = iconCode.endsWith('n');
            const code = iconCode.substring(0, 2);
            switch(code) {
                case '01': return isNight ? '<i class="fa-solid fa-moon w-color-moon"></i>' : '<i class="fa-solid fa-sun w-color-sun"></i>';
                case '02': return isNight ? '<i class="fa-solid fa-cloud-moon w-color-moon"></i>' : '<i class="fa-solid fa-cloud-sun w-color-sun"></i>';
                case '03': case '04': return '<i class="fa-solid fa-cloud w-color-cloud"></i>';
                case '09': case '10': return '<i class="fa-solid fa-cloud-showers-heavy w-color-rain"></i>';
                case '11': return '<i class="fa-solid fa-cloud-bolt w-color-bolt"></i>';
                case '13': return '<i class="fa-solid fa-snowflake w-color-snow"></i>';
                default: return '<i class="fa-solid fa-smog w-color-cloud"></i>';
            }
        }

        // 4. 背景管理
        function applyBg(src) { document.documentElement.style.setProperty('--bg-img', `url(${src})`); }
        const savedBg = localStorage.getItem('user_bg_img');
        if (savedBg) applyBg(savedBg);
        document.getElementById('bg-upload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => { applyBg(ev.target.result); localStorage.setItem('user_bg_img', ev.target.result); };
            reader.readAsDataURL(e.target.files[0]);
        });

        function resetSettings() { localStorage.clear(); location.reload(); }

        // 5. 數據抓取
        async function fetchAllWeather() {
            fetchGPSWeather();
            cities.forEach(city => fetchCityWeather(city));
        }

        async function fetchCityWeather(city) {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}&lang=zh_tw`);
                const d = await res.json();
                document.getElementById(`temp-${city.toLowerCase()}`).innerText = Math.round(d.main.temp) + '°';
                document.getElementById(`icon-${city.toLowerCase()}-box`).innerHTML = getWeatherIconHTML(d.weather[0].icon);
            } catch(e) {}
        }

        function fetchGPSWeather() {
            navigator.geolocation.getCurrentPosition(async p => {
                const { latitude: lat, longitude: lon } = p.coords;
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${API_KEY}&lang=zh_tw&lat=${lat}&lon=${lon}`);
                const d = await res.json();
                const geoRes = await fetch(`https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${API_KEY}`);
                const geoData = await geoRes.json();
                const city = geoData[0]?.local_names?.['zh'] || geoData[0]?.name || "未知";
                
                const iconHTML = getWeatherIconHTML(d.weather[0].icon);
                document.getElementById('g-city').innerText = city;
                document.getElementById('g-temp').innerText = Math.round(d.main.temp) + '°';
                document.getElementById('g-desc').innerText = d.weather[0].description;
                document.getElementById('g-icon-box').innerHTML = iconHTML;
                document.getElementById('lock-w-icon-box').innerHTML = iconHTML;
                document.getElementById('lock-w-temp').innerText = Math.round(d.main.temp) + '°';
                document.getElementById('lock-w-desc').innerText = d.weather[0].description;
            }, () => { document.getElementById('g-city').innerText = "定位失敗"; });
        }

        async function updateRate() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/TWD');
                const d = await r.json();
                currentRate = d.rates.JPY;
                document.getElementById('rate-info').innerText = `Rate: 1 TWD = ${currentRate.toFixed(2)} JPY`;
            } catch(e) {}
        }
        document.getElementById('twd-input').oninput = e => { 
            document.getElementById('jpy-output').innerText = e.target.value ? Math.round(e.target.value * currentRate).toLocaleString() : '0'; 
        };

        // 6. UI 控制
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-home').classList.toggle('opacity-30', id !== 'home-page');
            document.getElementById('tab-weather').classList.toggle('opacity-30', id !== 'weather-page');
            if(id === 'weather-page') fetchAllWeather();
        }

        function toggleLockScreen() {
            const ls = document.getElementById('lock-screen');
            const isActive = ls.classList.toggle('active');
            document.getElementById('ui-layer').style.display = isActive ? 'none' : 'block';
            document.querySelector('footer').style.opacity = isActive ? '0' : '1';
            if(isActive) updateTime();
        }

        function updateTime() {
            const n = new Date();
            document.getElementById('lock-time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            document.getElementById('lock-date').innerText = `${n.getMonth()+1}月${n.getDate()}日 ${days[n.getDay()]}`;
        }

        setInterval(updateTime, 1000);
        updateRate();
        showPage('home-page');
    </script>
</body>
</html>
