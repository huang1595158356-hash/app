<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>實用功能 - 極簡黑版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --bg-img: none; 
            --text-color: #ffffff; 
            --card-bg: rgba(255, 255, 255, 0.08); 
            --card-border: rgba(255, 255, 255, 0.12);
            --tab-bg: rgba(20, 20, 20, 0.85); 
            --accent: #0ea5e9;
        }
        
        body, html { 
            height: 100%; margin: 0; background: #000; max-width: 500px; margin: 0 auto; 
            color: var(--text-color); font-family: -apple-system, "SF Pro Display", "PingFang TC", sans-serif; 
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: var(--bg-img); background-size: cover; background-position: center; 
            z-index: 1; filter: brightness(0.6); transition: 0.6s ease;
        }

        .content-layer { position: relative; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; }
        
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; overflow-y: auto; 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: 110px;
        }
        .page.active { display: flex; animation: pageFadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        @keyframes pageFadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .glass-card:active { transform: scale(0.98); }

        .local-weather-card {
            border: 2px solid var(--accent);
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.15), rgba(14, 165, 233, 0.05));
        }

        .motion-card { opacity: 0; transform: translateY(15px); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .motion-card.is-visible { opacity: 1; transform: translateY(0); }

        input { border: none; background: transparent; outline: none; text-align: right; color: var(--text-color); font-weight: 800; }
        
        /* 移除 Chrome, Safari, Edge, Opera 的數字微調按鈕 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* 移除 Firefox 的數字微調按鈕 */
        input[type=number] {
            -moz-appearance: textfield;
        }

        .input-group { background: rgba(255,255,255,0.05); padding: 14px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); }

        .tax-tag { padding: 8px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); flex: 1; text-align: center; }
        .tax-tag.active { background: #10b981; color: white; border-color: #10b981; }

        /* 天氣動畫 */
        @keyframes sun-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes cloud-drift { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(5px); } }
        @keyframes fan-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .anim-sun { animation: sun-rotate 10s linear infinite; transform-origin: center; }
        .anim-cloud { animation: cloud-drift 4s ease-in-out infinite; }
        .anim-fan { animation: fan-rotate 2s linear infinite; display: inline-block; }

        .tab-bar-container { position: fixed; bottom: 24px; left: 0; right: 0; display: flex; justify-content: center; z-index: 100; padding: 0 20px; }
        .tab-bar { background: var(--tab-bg); backdrop-filter: blur(25px); border: 1px solid var(--card-border); border-radius: 32px; display: flex; justify-content: space-around; padding: 6px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .nav-btn { color: var(--text-color); opacity: 0.4; flex: 1; text-align: center; padding: 10px 0; transition: 0.2s; border-radius: 26px; cursor: pointer; }
        .nav-btn.active { color: var(--accent); opacity: 1; background: rgba(255,255,255,0.08); }
        
        .link-chip { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 16px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .link-chip:active { background: rgba(255,255,255,0.15); }
        .page::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-layer" id="main-bg"></div>

    <div class="content-layer">
        <!-- 首頁 -->
        <div id="home-page" class="page active px-6">
            <header class="py-10 flex justify-between items-center motion-card">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter">實用功能</h1>
                </div>
                <div class="flex gap-2">
                    <label class="px-4 h-9 rounded-full bg-white/10 flex items-center justify-center cursor-pointer border border-white/10 hover:bg-white/20 transition-all active:scale-95">
                        <i class="fa-solid fa-image text-xs mr-2"></i>
                        <span class="text-[10px] font-bold">更換背景圖片</span>
                        <input type="file" id="bg-upload" class="hidden" accept="image/*">
                    </label>
                </div>
            </header>

            <!-- 匯率區塊 -->
            <div class="glass-card motion-card">
                <div class="flex justify-between items-center mb-5">
                    <span class="text-[9px] font-black opacity-50 uppercase tracking-widest">即時匯率換算</span>
                    <span id="rate-display" class="text-[9px] font-bold text-sky-400 bg-sky-400/10 px-2 py-1 rounded">載入中...</span>
                </div>
                <div class="space-y-3">
                    <div class="input-group flex justify-between items-center">
                        <span class="text-xs font-black opacity-40">台幣 TWD</span>
                        <div class="flex items-center"><span class="text-lg font-black mr-2">$</span><input type="number" id="twd-input" class="text-xl w-32" placeholder="0"></div>
                    </div>
                    <div class="input-group flex justify-between items-center">
                        <span class="text-xs font-black opacity-40">日圓 JPY</span>
                        <div class="flex items-center"><span class="text-lg font-black mr-2">¥</span><input type="number" id="jpy-input" class="text-xl w-32" placeholder="0"></div>
                    </div>
                </div>
            </div>

            <!-- 翻譯區塊 -->
            <div class="glass-card motion-card">
                <span class="text-[9px] font-black opacity-50 uppercase tracking-widest mb-4 block">語音/文字翻譯</span>
                <button onclick="window.open('https://translate.google.com/?sl=zh-TW&tl=ja&op=translate')" class="w-full py-3.5 bg-sky-500 text-white rounded-2xl font-black text-xs shadow-xl shadow-sky-500/20 active:scale-95 transition-transform">開啟 Google 翻譯</button>
            </div>

            <!-- 日本官網跳轉模塊 -->
            <div class="glass-card motion-card">
                <span class="text-[9px] font-black opacity-50 uppercase tracking-widest mb-4 block">常用日本官網跳轉</span>
                <div class="grid grid-cols-2 gap-3">
                    <div class="link-chip" onclick="window.open('https://www.jorudan.co.jp/')"><i class="fa-solid fa-train text-sky-400"></i> 乘換案內</div>
                    <div class="link-chip" onclick="window.open('https://www.vjw.digital.go.jp/')"><i class="fa-solid fa-passport text-red-400"></i> Visit Japan</div>
                    <div class="link-chip" onclick="window.open('https://www.tabelog.com/')"><i class="fa-solid fa-utensils text-orange-400"></i> Tabelog</div>
                    <div class="link-chip" onclick="window.open('https://bigcamera.com/')"><i class="fa-solid fa-camera text-yellow-400"></i> BicCamera</div>
                </div>
            </div>
        </div>

        <!-- 免稅試算頁面 -->
        <div id="tax-page" class="page px-6">
            <header class="py-10">
                <h2 class="text-2xl font-black italic tracking-tighter text-emerald-400">免稅試算</h2>
                <p class="text-[9px] font-bold opacity-40 uppercase tracking-widest">日本免稅購物計算</p>
            </header>
            <div class="glass-card text-center">
                <p class="text-[9px] font-black opacity-50 uppercase tracking-widest mb-3">選擇消費類別 (稅率)</p>
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <button id="tax-10" onclick="setTax(0.1, 'tax-10')" class="tax-tag active">服飾/電器 10%</button>
                    <button id="tax-8" onclick="setTax(0.08, 'tax-8')" class="tax-tag">藥妝/消耗品 8%</button>
                    <button id="tax-food" onclick="setTax(0.08, 'tax-food')" class="tax-tag">外帶食品 8%</button>
                    <button id="tax-luxury" onclick="setTax(0.1, 'tax-luxury')" class="tax-tag">奢侈品/飾品 10%</button>
                </div>
                
                <div class="input-group flex justify-between items-center mb-6">
                    <span class="text-xs font-black opacity-40">標價 (含稅)</span>
                    <div class="flex items-center"><span class="text-xl font-black mr-2">¥</span><input type="number" id="tax-input" placeholder="0" class="text-2xl w-32 text-emerald-400"></div>
                </div>

                <div class="bg-emerald-400/10 p-6 rounded-[24px] border border-emerald-400/20">
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">免稅後金額</p>
                        <p id="tax-final" class="text-3xl font-black tracking-tighter">¥ 0</p>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-white/5">
                        <p class="text-[9px] font-black opacity-50 uppercase tracking-widest">節省稅金</p>
                        <p id="tax-saved" class="text-lg font-bold text-emerald-300 opacity-80">¥ 0</p>
                    </div>
                </div>
                <p class="mt-4 text-[9px] opacity-40 leading-relaxed font-bold">註：日本免稅通常需單筆滿 ¥5,000 (未稅)。<br>部分店家可能會收取 1.1%~2.1% 的手續費。</p>
            </div>
        </div>

        <!-- 景點推薦頁面 -->
        <div id="spots-page" class="page px-6">
            <header class="py-10">
                <h2 class="text-2xl font-black italic tracking-tighter text-amber-400">景點推薦</h2>
                <p class="text-[9px] font-bold opacity-40 uppercase tracking-widest">點擊開啟 Google Maps</p>
            </header>
            <div id="spots-list" class="space-y-3"></div>
        </div>

        <!-- 氣象頁面 -->
        <div id="weather-page" class="page px-6">
            <header class="py-10">
                <h2 class="text-2xl font-black italic tracking-tighter text-sky-400">氣象</h2>
                <p class="text-[9px] font-bold opacity-40 uppercase tracking-widest">點擊查看詳細預報</p>
            </header>

            <!-- 當地天氣模塊 -->
            <div class="glass-card local-weather-card mb-6" id="local-weather-card">
                <div class="flex justify-between items-center">
                    <div id="local-weather-info" class="flex-1">
                        <span class="text-[9px] font-black text-sky-400 uppercase tracking-widest block mb-1">當地天氣</span>
                        <p class="text-xl font-black">正在獲取定位...</p>
                    </div>
                    <div id="local-weather-icon"></div>
                </div>
            </div>

            <div id="weather-content" class="space-y-3"></div>
        </div>
    </div>

    <!-- 底部導覽 -->
    <div class="tab-bar-container">
        <nav class="tab-bar">
            <button onclick="showPage('home-page')" id="tab-home" class="nav-btn active"><i class="fa-solid fa-house-chimney text-lg"></i></button>
            <button onclick="showPage('tax-page')" id="tab-tax" class="nav-btn"><i class="fa-solid fa-receipt text-lg"></i></button>
            <button onclick="showPage('spots-page')" id="tab-spots" class="nav-btn"><i class="fa-solid fa-location-arrow text-lg"></i></button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="nav-btn"><i class="fa-solid fa-cloud-sun text-lg"></i></button>
        </nav>
    </div>

    <script>
        const WEATHER_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 4.75;
        let currentTaxRate = 0.1;

        const aqiMap = {
            1: { label: '優', color: 'text-emerald-400', bg: 'bg-emerald-400/20' },
            2: { label: '良', color: 'text-lime-400', bg: 'bg-lime-400/20' },
            3: { label: '普通', color: 'text-amber-400', bg: 'bg-amber-400/20' },
            4: { label: '差', color: 'text-orange-400', bg: 'bg-orange-400/20' },
            5: { label: '極差', color: 'text-red-400', bg: 'bg-red-400/20' }
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id.split('-')[0]).classList.add('active');
            
            // 每次顯示頁面時觸發卡片動畫
            const cards = document.getElementById(id).querySelectorAll('.motion-card');
            cards.forEach((c, i) => {
                c.classList.remove('is-visible');
                setTimeout(() => c.classList.add('is-visible'), i * 60);
            });

            if(id === 'spots-page') loadSpots();
            if(id === 'weather-page') { loadWeather(); loadLocalWeather(); }
        }

        // 匯率計算
        const twdIn = document.getElementById('twd-input'), jpyIn = document.getElementById('jpy-input');
        if(twdIn) twdIn.oninput = () => jpyIn.value = twdIn.value ? Math.round(twdIn.value * currentRate) : '';
        if(jpyIn) jpyIn.oninput = () => twdIn.value = jpyIn.value ? Math.round(jpyIn.value / currentRate) : '';

        // 免稅試算
        function setTax(r, btnId) {
            currentTaxRate = r;
            document.querySelectorAll('.tax-tag').forEach(b => b.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
            calculateTax();
        }
        function calculateTax() {
            const v = parseFloat(document.getElementById('tax-input').value) || 0;
            const preTax = Math.round(v / (1 + currentTaxRate));
            const saved = v - preTax;
            document.getElementById('tax-final').innerText = `¥ ${preTax.toLocaleString()}`;
            document.getElementById('tax-saved').innerText = `¥ ${saved.toLocaleString()}`;
        }
        document.getElementById('tax-input').oninput = calculateTax;

        // 天氣圖示生成
        function getWeatherIcon(main, iconCode) {
            const isNight = iconCode.includes('n');
            const sunColor = isNight ? '#94a3b8' : '#fbbf24';
            const isClear = main.toLowerCase() === 'clear';
            const isRain = main.toLowerCase().includes('rain') || main.toLowerCase().includes('drizzle');
            
            let html = `<svg viewBox="0 0 64 64" class="w-14 h-14 overflow-visible">`;
            if (isClear) {
                html += `<circle cx="32" cy="32" r="12" fill="${sunColor}" class="anim-sun" />`;
            } else if (isRain) {
                html += `<path class="anim-cloud" d="M48,38c0,6.6-5.4,12-12,12H20c-6.6,0-12-5.4-12-12s5.4-12,12-12h1.6c1.6-4.8,7.8-9,15.2-9c9.6,0,17.3,7.7,17.3,17.3" fill="#94a3b8" />`;
            } else {
                html += `<circle cx="42" cy="24" r="8" fill="${sunColor}" opacity="0.6" />
                         <path class="anim-cloud" d="M38,44c0,4.4-3.6,8-8,8H18c-4.4,0-8-3.6-8-8s3.6-8,8-8h1.1c0.7-3.2,4.9-6,9.8-6c6.4,0,11.5,5.1,11.5,11.5" fill="white" fill-opacity="0.8" />`;
            }
            html += `</svg>`;
            return html;
        }

        async function fetchAQI(lat, lon) {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${WEATHER_KEY}`);
                const d = await res.json();
                return d.list[0].main.aqi;
            } catch(e) { return 1; }
        }

        async function loadWeather() {
            const container = document.getElementById('weather-content');
            container.innerHTML = '<p class="text-center py-10 opacity-30 font-bold text-xs">載入數據中...</p>';
            try {
                const cities = ['Tokyo', 'Osaka', 'Kyoto', 'Sapporo', 'Fukuoka'];
                const names = { Tokyo: '東京', Osaka: '大阪', Kyoto: '京都', Sapporo: '札幌', Fukuoka: '福岡' };
                let html = '';
                for(let city of cities) {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${WEATHER_KEY}&lang=zh_tw`);
                    const d = await res.json();
                    const aqi = await fetchAQI(d.coord.lat, d.coord.lon);
                    html += `
                        <div class="glass-card flex justify-between items-center" onclick="window.open('https://openweathermap.org/city/${d.id}')">
                            <div class="flex-1">
                                <p class="text-xl font-black">${names[city]}</p>
                                <div class="flex flex-wrap items-center gap-2 mt-1">
                                    <span class="text-sky-400 font-bold text-[10px] uppercase">${d.weather[0].description}</span>
                                    <span class="bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full font-black text-[9px]">
                                        <i class="fa-solid fa-fan anim-fan"></i> ${(d.wind.speed * 3.6).toFixed(1)} km/h
                                    </span>
                                    <span class="${aqiMap[aqi].bg} ${aqiMap[aqi].color} px-2 py-0.5 rounded-full font-black text-[9px]">AQI: ${aqiMap[aqi].label}</span>
                                </div>
                                <p class="text-3xl font-black mt-2">${Math.round(d.main.temp)}°C</p>
                            </div>
                            <div class="flex items-center justify-center">${getWeatherIcon(d.weather[0].main, d.weather[0].icon)}</div>
                        </div>`;
                }
                container.innerHTML = html;
            } catch(e) { container.innerHTML = '<p class="text-center text-red-400">讀取失敗</p>'; }
        }

        async function loadLocalWeather() {
            const info = document.getElementById('local-weather-info');
            const iconBox = document.getElementById('local-weather-icon');
            if (!navigator.geolocation) { info.innerHTML = '<p class="text-xs opacity-50">不支援定位</p>'; return; }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&units=metric&appid=${WEATHER_KEY}&lang=zh_tw`);
                    const d = await res.json();
                    const aqi = await fetchAQI(latitude, longitude);
                    info.innerHTML = `
                        <span class="text-[9px] font-black text-sky-400 uppercase tracking-widest block mb-1">當地天氣 (${d.name})</span>
                        <div class="flex items-baseline gap-2">
                            <p class="text-3xl font-black">${Math.round(d.main.temp)}°C</p>
                            <span class="text-xs font-bold opacity-60">${d.weather[0].description}</span>
                        </div>
                        <div class="flex gap-2 mt-2">
                            <span class="text-[10px] font-bold opacity-40"><i class="fa-solid fa-fan anim-fan mr-1"></i>${(d.wind.speed * 3.6).toFixed(1)} km/h</span>
                            <span class="text-[10px] font-black ${aqiMap[aqi].color} bg-white/5 px-2 py-0.5 rounded-full">AQI: ${aqiMap[aqi].label}</span>
                        </div>`;
                    iconBox.innerHTML = getWeatherIcon(d.weather[0].main, d.weather[0].icon);
                } catch(e) { info.innerHTML = '<p class="text-red-400 text-xs">獲取失敗</p>'; }
            }, () => { info.innerHTML = '<p class="text-xs opacity-40">無法定位</p>'; });
        }

        function loadSpots() {
            const container = document.getElementById('spots-list');
            const data = [{ t: '地標', i: 'fa-torii-gate' }, { t: '美食', i: 'fa-bowl-food' }, { t: '購物', i: 'fa-bag-shopping' }];
            container.innerHTML = data.map(s => `
                <div class="glass-card flex justify-between items-center py-6" onclick="window.open('https://www.google.com/maps/search/日本+${s.t}/')">
                    <p class="text-xl font-black">${s.t}</p>
                    <i class="fa-solid ${s.i} text-amber-400 text-xl"></i>
                </div>`).join('');
        }

        // 背景上傳
        document.getElementById('bg-upload').onchange = e => {
            const r = new FileReader();
            r.onload = ev => document.getElementById('main-bg').style.backgroundImage = `url(${ev.target.result})`;
            r.readAsDataURL(e.target.files[0]);
        };

        window.onload = () => {
            // 初始匯率獲取
            fetch('https://open.er-api.com/v6/latest/TWD').then(r=>r.json()).then(d=>{
                currentRate = d.rates.JPY;
                document.getElementById('rate-display').innerText = `1 台幣 = ${currentRate.toFixed(2)} 日圓`;
            });
            showPage('home-page');
        };
    </script>
</body>
</html>
