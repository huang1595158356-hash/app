<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --bg-img: none; --text-color: #ffffff; 
            --card-bg: rgba(255, 255, 255, 0.08); /* 極限薄度 */
            --tab-bg: rgba(20, 20, 20, 0.8); 
            --glass-blur: 50px; 
            --base-bg: linear-gradient(135deg, #121212 0%, #000000 100%);
        }
        
        body.light-mode {
            --text-color: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.45);
            --tab-bg: rgba(255, 255, 255, 0.85);
            --base-bg: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body, html { 
            height: 100%; margin: 0; overflow: hidden; background: var(--base-bg); max-width: 500px; margin: 0 auto; 
            color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.5s ease;
        }

        .bg-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--base-bg); background-image: var(--bg-img); 
            background-size: cover; background-position: center; 
            z-index: 1; transform: scale(1.1); /* 稍微放大背景讓邊緣模糊更自然 */
        }

        .content-layer { position: relative; width: 100%; height: 100%; z-index: 2; overflow-y: auto; padding-top: env(safe-area-inset-top); }
        
        /* 核心毛玻璃樣式 - 終極強化 */
        .card-frosted { 
            background: var(--card-bg) !important;
            backdrop-filter: blur(var(--glass-blur)) saturate(230%) brightness(110%) !important;
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(230%) brightness(110%) !important;
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(255,255,255,0.05);
            border-radius: 35px;
            margin-bottom: 20px;
        }

        /* 模式切換按鈕效果 */
        #theme-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tab-bar { 
            background: var(--tab-bg); 
            backdrop-filter: blur(30px) saturate(180%); 
            -webkit-backdrop-filter: blur(30px) saturate(180%); 
            border: 1.5px solid rgba(255, 255, 255, 0.1); 
        }

        /* 天氣圖標發光 */
        .w-color-sun { color: #ff9f43; filter: drop-shadow(0 0 12px rgba(255,159,67,0.6)); }
        .w-color-moon { color: #f6e05e; filter: drop-shadow(0 0 15px rgba(246,224,94,0.7)); }
        .w-color-rain { color: #38bdf8; filter: drop-shadow(0 0 8px #38bdf8); }
        
        #lock-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; 
            background: rgba(0,0,0,0.4); display: none; flex-direction: column; 
            align-items: center; justify-content: flex-start; padding-top: 120px; 
            backdrop-filter: blur(50px) brightness(80%); -webkit-backdrop-filter: blur(50px) brightness(80%);
        }
        #lock-screen.active { display: flex; }
    </style>
</head>
<body class="dark-mode">
    <div class="bg-layer" id="main-bg"></div>

    <div id="lock-screen" onclick="toggleLockScreen()">
        <p id="lock-time" class="text-8xl font-black text-white tracking-tighter">00:00</p>
        <p id="lock-date" class="text-xl font-bold mt-2 text-white/70">日期讀取中</p>
        <div class="mt-16 card-frosted p-8 flex items-center gap-6 w-80">
            <div id="lock-w-icon-box" class="text-6xl"></div>
            <div class="text-white">
                <p id="lock-w-temp" class="text-4xl font-black">--°</p>
                <p id="lock-w-desc" class="font-bold opacity-60">讀取中</p>
            </div>
        </div>
    </div>

    <div class="content-layer" id="ui-layer">
        <div id="home-page" class="page active">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h1 class="text-4xl font-black italic tracking-tighter">JP</h1>
                <div class="flex items-center space-x-3">
                    <button onclick="toggleTheme()" id="theme-btn" class="w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-2xl active:scale-90 transition-transform">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <label class="text-[11px] font-black bg-white/10 px-5 py-3 rounded-full border border-white/20">
                        背景 <input type="file" id="bg-upload" accept="image/*" class="hidden">
                    </label>
                    <button onclick="toggleLockScreen()" class="text-[11px] bg-sky-500 text-white font-black px-5 py-3 rounded-full shadow-lg">鎖定</button>
                </div>
            </header>
            
            <main class="p-6">
                <section class="card-frosted p-10 text-center">
                    <p class="text-[11px] font-black tracking-[0.4em] opacity-40 mb-8 uppercase">Exchange Rate</p>
                    <div class="flex items-center justify-center space-x-2">
                        <span class="text-2xl font-bold opacity-20">$</span>
                        <input type="number" id="twd-input" placeholder="0" inputmode="decimal" class="text-6xl font-black w-full text-center bg-transparent outline-none">
                    </div>
                    <div class="mt-8">
                        <div class="text-6xl font-black text-sky-500">¥ <span id="jpy-output">0</span></div>
                        <p id="rate-info" class="text-[10px] opacity-40 mt-5 font-bold uppercase"></p>
                    </div>
                </section>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted p-8 flex flex-col items-center">
                        <i class="fa-solid fa-train-subway text-orange-400 text-3xl mb-4"></i>
                        <span class="font-bold text-[10px] uppercase tracking-widest">交通查詢</span>
                    </a>
                    <a href="https://maps.google.com" target="_blank" class="card-frosted p-8 flex flex-col items-center">
                        <i class="fa-solid fa-map-location-dot text-blue-400 text-3xl mb-4"></i>
                        <span class="font-bold text-[10px] uppercase tracking-widest">地圖導航</span>
                    </a>
                </div>
                <button onclick="resetSettings()" class="w-full py-10 text-[10px] font-bold opacity-20 uppercase tracking-[0.5em]">Reset All</button>
            </main>
        </div>

        <div id="weather-page" class="page">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h2 class="text-2xl font-black italic tracking-widest uppercase">Weather</h2>
                <button onclick="fetchAllWeather()" class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center border border-white/20 active:rotate-180 transition-transform"><i class="fa-solid fa-rotate"></i></button>
            </header>
            <div id="weather-content" class="px-6 space-y-4 pb-12">
                </div>
        </div>
    </div>

    <footer class="fixed bottom-8 left-0 right-0 z-50 px-10">
        <div class="tab-bar rounded-full p-2.5 flex justify-around items-center max-w-xs mx-auto shadow-2xl">
            <button onclick="showPage('home-page')" id="tab-home" class="flex-1 py-4 text-sky-500"><i class="fa-solid fa-house-chimney text-xl"></i></button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="flex-1 py-4 opacity-30"><i class="fa-solid fa-cloud-sun text-xl"></i></button>
        </div>
    </footer>

    <script>
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 4.75;

        function toggleTheme(force = null) {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            const isLight = force !== null ? force : !body.classList.contains('light-mode');
            if (isLight) {
                body.classList.add('light-mode');
                btn.innerHTML = '<i class="fa-solid fa-sun text-orange-500"></i>';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-mode');
                btn.innerHTML = '<i class="fa-solid fa-moon text-sky-300"></i>';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') toggleTheme(true);
        else if (savedTheme === 'dark') toggleTheme(false);
        else toggleTheme(new Date().getHours() >= 6 && new Date().getHours() < 18);

        function getWeatherIconHTML(iconCode) {
            const isNight = iconCode.endsWith('n');
            const code = iconCode.substring(0, 2);
            switch(code) {
                case '01': return isNight ? '<i class="fa-solid fa-moon w-color-moon"></i>' : '<i class="fa-solid fa-sun w-color-sun"></i>';
                case '02': return isNight ? '<i class="fa-solid fa-cloud-moon w-color-moon"></i>' : '<i class="fa-solid fa-cloud-sun w-color-sun"></i>';
                case '03': case '04': return '<i class="fa-solid fa-cloud w-color-cloud"></i>';
                case '09': case '10': return '<i class="fa-solid fa-cloud-showers-heavy w-color-rain"></i>';
                case '11': return '<i class="fa-solid fa-cloud-bolt w-color-bolt"></i>';
                case '13': return '<i class="fa-solid fa-snowflake w-color-snow"></i>';
                default: return '<i class="fa-solid fa-smog w-color-cloud"></i>';
            }
        }

        function applyBg(src) { document.documentElement.style.setProperty('--bg-img', `url(${src})`); }
        const savedBg = localStorage.getItem('user_bg_img');
        if (savedBg) applyBg(savedBg);
        document.getElementById('bg-upload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => { applyBg(ev.target.result); localStorage.setItem('user_bg_img', ev.target.result); };
            reader.readAsDataURL(e.target.files[0]);
        });

        function resetSettings() { localStorage.clear(); location.reload(); }

        async function fetchAllWeather() {
            const container = document.getElementById('weather-content');
            container.innerHTML = `<div class="card-frosted p-8 border-l-8 border-sky-400">
                <p class="text-[10px] font-black opacity-40 uppercase tracking-widest mb-2">GPS Location</p>
                <div class="flex justify-between items-center"><p id="g-city" class="text-2xl font-black">Locating...</p><span id="g-temp" class="text-5xl font-black">--°</span></div>
                <div id="g-icon-box" class="text-4xl mt-3"></div>
            </div>`;
            
            const cities = ['Tokyo', 'Osaka', 'Kyoto', 'Fukuoka', 'Sapporo'];
            const nameMap = { 'Tokyo': '東京', 'Osaka': '大阪', 'Kyoto': '京都', 'Fukuoka': '福岡', 'Sapporo': '札幌' };
            
            for(let city of cities) {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}&lang=zh_tw`);
                    const d = await res.json();
                    container.innerHTML += `<div class="card-frosted p-7 flex justify-between items-center">
                        <span class="font-black text-lg italic uppercase">${nameMap[city]}</span>
                        <div class="flex items-center gap-5">
                            <span class="font-black text-2xl">${Math.round(d.main.temp)}°</span>
                            <div class="text-3xl w-10 text-center">${getWeatherIconHTML(d.weather[0].icon)}</div>
                        </div>
                    </div>`;
                } catch(e) {}
            }
            fetchGPS();
        }

        function fetchGPS() {
            navigator.geolocation.getCurrentPosition(async p => {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${API_KEY}&lat=${p.coords.latitude}&lon=${p.coords.longitude}&lang=zh_tw`);
                const d = await res.json();
                const icon = getWeatherIconHTML(d.weather[0].icon);
                document.getElementById('g-city').innerText = d.name;
                document.getElementById('g-temp').innerText = Math.round(d.main.temp) + '°';
                document.getElementById('g-icon-box').innerHTML = icon;
                document.getElementById('lock-w-icon-box').innerHTML = icon;
                document.getElementById('lock-w-temp').innerText = Math.round(d.main.temp) + '°';
                document.getElementById('lock-w-desc').innerText = d.weather[0].description;
            });
        }

        async function updateRate() {
            const r = await fetch('https://open.er-api.com/v6/latest/TWD'); const d = await r.json();
            currentRate = d.rates.JPY; document.getElementById('rate-info').innerText = `1 TWD = ${currentRate.toFixed(2)} JPY`;
        }
        document.getElementById('twd-input').oninput = e => { document.getElementById('jpy-output').innerText = e.target.value ? Math.round(e.target.value * currentRate).toLocaleString() : '0'; };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-home').classList.toggle('opacity-30', id !== 'home-page');
            document.getElementById('tab-weather').classList.toggle('opacity-30', id !== 'weather-page');
            if(id === 'weather-page') fetchAllWeather();
        }

        function toggleLockScreen() {
            const ls = document.getElementById('lock-screen');
            ls.classList.toggle('active');
            updateTime();
        }

        function updateTime() {
            const n = new Date();
            document.getElementById('lock-time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            document.getElementById('lock-date').innerText = `${n.getMonth()+1}月${n.getDate()}日 ${days[n.getDay()]}`;
        }

        setInterval(updateTime, 1000);
        updateRate();
        showPage('home-page');
    </script>
</body>
</html>
