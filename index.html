<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/826/826070.png">
    <title>日本助手 - AI 強化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-img: none; --text-color: #ffffff; --card-bg: rgba(255, 255, 255, 0.12);
            --tab-bg: rgba(0, 0, 0, 0.8); --glass-blur: 40px; 
        }
        body, html { 
            height: 100%; margin: 0; overflow: hidden; background: #000; max-width: 500px; margin: 0 auto; 
            color: var(--text-color); 
            font-family: "SF Pro Display", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; background-image: var(--bg-img); background-size: cover; background-position: center; z-index: 1; transition: background-image 0.6s ease; }
        .content-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; overflow-y: auto; padding-top: env(safe-area-inset-top); }
        .page { display: none; opacity: 0; transition: opacity 0.4s ease; padding-bottom: 140px; }
        .page.active { display: block; opacity: 1; }
        .card-frosted { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(var(--glass-blur)) saturate(160%); -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%); box-shadow: 0 15px 35px rgba(0,0,0,0.4); border-radius: 30px; }
        .tab-bar { background: var(--tab-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        input::placeholder { color: rgba(255,255,255,0.3); }
        
        #lock-time { font-size: 6.5rem; font-weight: 800; letter-spacing: -3px; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .lock-screen-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,0.1); display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 100px; }
        .lock-screen-overlay.active { display: flex; animation: lockFadeIn 0.3s ease-out; }
        @keyframes lockFadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
        .ai-glow { animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px rgba(168, 85, 247, 0.2); } to { box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); } }
    </style>
</head>
<body>
    <div class="bg-layer" id="main-bg"></div>

    <div id="lock-screen" class="lock-screen-overlay" onclick="toggleLockScreen()">
        <p id="lock-time" class="text-white">00:00</p>
        <p id="lock-date" class="text-2xl font-bold mt-2 text-white">日期讀取中</p>
        <div class="mt-12 bg-black/30 p-6 rounded-[40px] border border-white/10 flex items-center gap-5 backdrop-blur-md">
            <img id="lock-w-icon" src="" class="w-20 h-20">
            <div class="text-white">
                <p id="lock-w-temp" class="text-5xl font-black">--°</p>
                <p id="lock-w-desc" class="font-bold text-lg">讀取中</p>
            </div>
        </div>
    </div>

    <div class="content-layer" id="ui-layer">
        <div id="home-page" class="page active">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h1 class="text-3xl font-black italic tracking-tighter" style="color: var(--text-color);">JAPAN GO</h1>
                <div class="flex items-center space-x-3">
                    <button onclick="toggleLockScreen()" class="text-[11px] bg-white text-black font-black px-4 py-2 rounded-full shadow-lg">預覽</button>
                    <label class="text-[11px] font-black bg-white/10 px-4 py-2 rounded-full border border-white/10" style="color: var(--text-color);">
                        更換圖片 <input type="file" id="bg-upload" accept="image/*" class="hidden">
                    </label>
                </div>
            </header>
            <main class="p-6 space-y-6">
                <section class="card-frosted p-10 text-center">
                    <p class="text-[11px] font-black tracking-[0.4em] opacity-50 mb-8" style="color: var(--text-color);">台幣 ⮕ 日圓 (TWD-JPY)</p>
                    <div class="flex items-center justify-center space-x-2">
                        <span class="text-2xl font-bold opacity-40">$</span>
                        <input type="number" id="twd-input" placeholder="0" inputmode="decimal" class="text-6xl font-black w-full text-center bg-transparent outline-none">
                    </div>
                    <div class="mt-8">
                        <div class="text-6xl font-black text-blue-500">¥ <span id="jpy-output">0</span></div>
                        <p id="rate-info" class="text-[10px] opacity-40 mt-5 font-bold" style="color: var(--text-color);"></p>
                    </div>
                </section>
                <div class="grid grid-cols-2 gap-4">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted p-7 flex flex-col items-center">
                        <i class="fa-solid fa-train-subway text-orange-400 text-3xl mb-4"></i>
                        <span class="font-bold text-xs" style="color: var(--text-color);">交通查詢</span>
                    </a>
                    <a href="http://maps.google.com" target="_blank" class="card-frosted p-7 flex flex-col items-center">
                        <i class="fa-solid fa-map-location-dot text-blue-400 text-3xl mb-4"></i>
                        <span class="font-bold text-xs" style="color: var(--text-color);">地圖導航</span>
                    </a>
                </div>
            </main>
        </div>

        <div id="weather-page" class="page">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h2 class="text-2xl font-black italic" style="color: var(--text-color);">精準氣象</h2>
                <button onclick="refreshWeather()" class="text-[11px] bg-white text-black font-black px-5 py-2 rounded-full">刷新數據</button>
            </header>
            
            <div class="px-6 space-y-6">
                <div class="card-frosted p-10 text-center">
                    <p class="text-[10px] font-black opacity-50 uppercase tracking-[0.3em] mb-2" style="color: var(--text-color);">當前定位</p>
                    <p id="g-city" class="text-3xl font-black mb-6" style="color: var(--text-color);">讀取中...</p>
                    <div class="flex justify-between items-center px-4">
                        <p id="g-temp" class="text-8xl font-black tracking-tighter" style="color: var(--text-color);">--°</p>
                        <img id="g-icon" src="" class="w-28 h-28">
                    </div>
                    <p id="g-desc" class="text-sky-400 font-black mt-4 text-xl">--</p>
                </div>

                <div class="card-frosted p-6 ai-glow border-purple-500/30">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles text-purple-400"></i>
                            <span class="font-black text-[10px] tracking-widest opacity-50">AI 旅遊指南</span>
                        </div>
                        <button onclick="getAIAdvice()" id="ai-btn" class="text-[10px] font-bold bg-purple-500 text-white px-3 py-1 rounded-full">獲取建議</button>
                    </div>
                    <p id="ai-content" class="text-sm font-bold leading-relaxed opacity-80">點擊按鈕，讓 AI 分析當前天氣並給予穿衣與旅遊建議。</p>
                </div>
                
                <div class="flex justify-between items-center px-2">
                    <p class="text-[11px] font-black tracking-[0.3em] opacity-40 uppercase" style="color: var(--text-color);">自訂追蹤地區</p>
                    <button onclick="saveCustomPlaces()" class="text-[10px] font-bold text-blue-400">儲存</button>
                </div>
                <div class="space-y-4" id="custom-container">
                    </div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-8 left-0 right-0 z-50 px-10">
        <div class="tab-bar rounded-full p-2.5 flex justify-around items-center max-w-xs mx-auto shadow-2xl">
            <button onclick="showPage('home-page')" id="tab-home" class="flex-1 py-4 text-white"><i class="fa-solid fa-plane-departure text-xl"></i></button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="flex-1 py-4 text-white/30"><i class="fa-solid fa-cloud-sun text-xl"></i></button>
        </div>
    </footer>

    <script>
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        const GEMINI_KEY = 'YOUR_GEMINI_API_KEY'; // 請在此處填入你的 Gemini API Key
        let currentRate = 4.75;

        // --- 1. 背景與 UI 邏輯 ---
        function applyBg(src) {
            document.documentElement.style.setProperty('--bg-img', `url(${src})`);
            const img = new Image(); img.src = src;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 1, 1); const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const brightness = Math.sqrt(0.299*(r*r) + 0.587*(g*g) + 0.114*(b*b));
                document.documentElement.style.setProperty('--text-color', brightness > 155 ? '#000' : '#fff');
                document.documentElement.style.setProperty('--card-bg', brightness > 155 ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.12)');
            };
        }

        const savedBg = localStorage.getItem('user_bg_img');
        if (savedBg) applyBg(savedBg);
        document.getElementById('bg-upload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => { applyBg(ev.target.result); localStorage.setItem('user_bg_img', ev.target.result); };
            reader.readAsDataURL(e.target.files[0]);
        });

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-home').style.color = (id === 'home-page' ? '#fff' : 'rgba(255,255,255,0.3)');
            document.getElementById('tab-weather').style.color = (id === 'weather-page' ? '#fff' : 'rgba(255,255,255,0.3)');
            if(id === 'weather-page') { initWeather(); }
        }

        // --- 2. 匯率邏輯 ---
        async function updateRate() {
            try { const r = await fetch('https://open.er-api.com/v6/latest/TWD'); const d = await r.json(); currentRate = d.rates.JPY; document.getElementById('rate-info').innerText = `即時匯率: 1 TWD = ${currentRate.toFixed(2)} JPY`; } catch(e) {}
        }
        document.getElementById('twd-input').oninput = e => { document.getElementById('jpy-output').innerText = e.target.value ? Math.round(e.target.value * currentRate).toLocaleString() : '0'; };

        // --- 3. 天氣核心邏輯 (含 10 分鐘快取) ---
        async function initWeather() {
            const cache = JSON.parse(localStorage.getItem('weather_main_cache'));
            const now = Date.now();

            if (cache && (now - cache.time < 600000)) { // 10 分鐘 (600,000 毫秒)
                renderWeather(cache.data, cache.city);
                loadCustomPlaces();
            } else {
                getGPS();
            }
        }

        function refreshWeather() { localStorage.removeItem('weather_main_cache'); getGPS(); loadCustomPlaces(true); }

        function getGPS() {
            navigator.geolocation.getCurrentPosition(
                async p => {
                    const lat = p.coords.latitude; const lon = p.coords.longitude;
                    const geoRes = await fetch(`https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${API_KEY}`);
                    const geoData = await geoRes.json();
                    const city = geoData[0]?.local_names?.['zh'] || geoData[0]?.name || "未知區域";
                    
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${API_KEY}&lang=zh_tw&lat=${lat}&lon=${lon}`);
                    const data = await res.json();
                    
                    if(res.status === 429) { alert("API 額度已達上限，請一小時後再試"); return; }
                    
                    const cacheObj = { time: Date.now(), data: data, city: city };
                    localStorage.setItem('weather_main_cache', JSON.stringify(cacheObj));
                    renderWeather(data, city);
                },
                e => { alert("請開啟定位權限以獲取精準天氣"); },
                { enableHighAccuracy: true }
            );
        }

        function renderWeather(d, city) {
            const icon = `https://openweathermap.org/img/wn/${d.weather[0].icon}@4x.png`;
            document.getElementById('g-city').innerText = city;
            document.getElementById('g-temp').innerText = Math.round(d.main.temp) + '°';
            document.getElementById('g-icon').src = icon;
            document.getElementById('g-desc').innerText = d.weather[0].description;
            
            // 同步鎖屏
            document.getElementById('lock-w-icon').src = icon;
            document.getElementById('lock-w-temp').innerText = Math.round(d.main.temp) + '°';
            document.getElementById('lock-w-desc').innerText = d.weather[0].description;
        }

        // --- 4. AI 助手邏輯 ---
        async function getAIAdvice() {
            const content = document.getElementById('ai-content');
            const btn = document.getElementById('ai-btn');
            const city = document.getElementById('g-city').innerText;
            const temp = document.getElementById('g-temp').innerText;
            const desc = document.getElementById('g-desc').innerText;

            if (GEMINI_KEY === 'YOUR_GEMINI_API_KEY') {
                content.innerText = "請在代碼中填入你的 Gemini API Key 才能開啟 AI 功能。";
                return;
            }

            btn.innerText = "思考中...";
            btn.disabled = true;

            const prompt = `你是日本自助助手。目前在${city}，天氣${desc}，氣溫${temp}。請用40字以內的繁體中文，針對穿著建議和旅遊提醒給出一個具備幽默感且精闢的回答。`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                content.innerText = d.candidates[0].content.parts[0].text;
            } catch (e) {
                content.innerText = "AI 暫時離線，可能是額度爆了或是 Key 有誤。";
            } finally {
                btn.innerText = "獲取建議";
                btn.disabled = false;
            }
        }

        // --- 5. 自訂地區邏輯 ---
        const customContainer = document.getElementById('custom-container');
        function saveCustomPlaces() {
            const inputs = document.querySelectorAll('.custom-input');
            const places = Array.from(inputs).map(i => i.value);
            localStorage.setItem('custom_places_v2', JSON.stringify(places));
            loadCustomPlaces(true);
        }

        async function loadCustomPlaces(forceRefresh = false) {
            const saved = JSON.parse(localStorage.getItem('custom_places_v2') || '["", "", ""]');
            customContainer.innerHTML = '';
            saved.forEach(async (name, i) => {
                const html = `
                    <div class="card-frosted p-4 flex flex-col space-y-3">
                        <input type="text" value="${name}" placeholder="地區 ${i+1}" class="custom-input bg-white/5 p-3 rounded-xl border border-white/10 outline-none font-bold text-sm">
                        <div id="res-${i}" class="flex justify-between items-center px-2 ${name ? '' : 'hidden'}">
                            <span class="font-black text-lg">${name}</span>
                            <div class="flex items-center gap-3">
                                <span class="font-black text-2xl" id="temp-res-${i}">--°</span>
                                <img id="icon-res-${i}" src="" class="w-10">
                            </div>
                        </div>
                    </div>`;
                customContainer.innerHTML += html;
                if(name) fetchCityWeather(name, i);
            });
        }

        async function fetchCityWeather(city, index) {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}&lang=zh_tw`);
                const d = await res.json();
                if(d.cod === 200) {
                    document.getElementById(`temp-res-${index}`).innerText = Math.round(d.main.temp) + '°';
                    document.getElementById(`icon-res-${index}`).src = `https://openweathermap.org/img/wn/${d.weather[0].icon}.png`;
                }
            } catch(e) {}
        }

        // --- 6. 時間與鎖屏 ---
        function toggleLockScreen() {
            const ls = document.getElementById('lock-screen');
            const isActive = ls.classList.toggle('active');
            document.getElementById('ui-layer').style.display = isActive ? 'none' : 'block';
            document.querySelector('footer').style.opacity = isActive ? '0' : '1';
            if(isActive) updateTime();
        }

        function updateTime() {
            const n = new Date(); document.getElementById('lock-time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            document.getElementById('lock-date').innerText = `${n.getMonth()+1}月${n.getDate()}日 ${days[n.getDay()]}`;
        }
        setInterval(updateTime, 1000);

        updateRate();
        showPage('home-page');
    </script>
</body>
</html>
