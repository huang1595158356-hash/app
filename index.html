<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="日本助手">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/826/826070.png">
    
    <title>日本自助助手 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-img: none; /* 預設為黑色背景 */
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.12);
            --sub-text: rgba(255, 255, 255, 0.6);
            --tab-bg: rgba(0, 0, 0, 0.8);
            --glass-blur: 40px; /* 強化毛玻璃模糊度 */
        }
        
        body, html { 
            height: 100%; margin: 0; overflow: hidden; 
            background: #000; max-width: 500px; margin: 0 auto; 
            color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* 1. 背景層 */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            background-image: var(--bg-img); 
            background-size: cover; background-position: center center;
            z-index: 1; transition: background-image 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 2. UI 內容層 */
        .content-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; overflow-y: auto; 
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
            transition: opacity 0.3s ease;
        }

        .page { display: none; opacity: 0; transition: opacity 0.4s ease; padding-bottom: 140px; }
        .page.active { display: block; opacity: 1; }

        /* 強化版毛玻璃模組 - 解決閱讀問題 */
        .card-frosted { 
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(var(--glass-blur)) saturate(160%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        input[type="number"] { background: transparent; color: var(--text-color); text-align: center; font-size: 3.5rem; font-weight: 800; width: 100%; outline: none; }
        input[type="number"]::placeholder { color: var(--sub-text); opacity: 0.3; }
        
        /* 底部導覽列 */
        .tab-bar {
            background: var(--tab-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* 手機鎖屏預覽模式 */
        .lock-screen-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; background: rgba(0,0,0,0.15); display: none;
            flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 100px; text-shadow: 0 2px 20px rgba(0,0,0,0.7);
        }
        .lock-screen-overlay.active { display: flex; animation: lockFadeIn 0.4s ease forwards; }
        @keyframes lockFadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="bg-layer" id="main-bg"></div>

    <div id="lock-screen" class="lock-screen-overlay" onclick="toggleLockScreen()">
        <p id="lock-time" class="text-8xl font-thin tracking-tighter text-white">00:00</p>
        <p id="lock-date" class="text-xl font-light mt-2 text-white">--月--日 星期--</p>
        
        <div class="mt-16 bg-black/30 px-10 py-5 rounded-[40px] border border-white/10 flex items-center space-x-5">
            <img id="lock-w-icon" src="" class="w-16 h-16">
            <div class="text-white text-left">
                <p id="lock-w-temp" class="text-4xl font-bold">--°C</p>
                <p id="lock-w-desc" class="text-sm opacity-80">獲取天氣中...</p>
            </div>
        </div>
        <p id="lock-tz" class="mt-6 text-[10px] text-white/50 uppercase tracking-[0.2em] font-bold"></p>
        <p class="absolute bottom-24 text-[11px] text-white/30 tracking-widest">點擊任意處退出預覽</p>
    </div>

    <div class="content-layer" id="ui-layer">
        
        <div id="home-page" class="page active">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h1 class="text-3xl font-black italic tracking-tighter" style="color: var(--text-color);">JAPAN GO</h1>
                <div class="flex items-center space-x-3">
                    <button onclick="toggleLockScreen()" class="text-[11px] bg-white text-black font-extrabold px-4 py-2 rounded-full shadow-xl">預覽</button>
                    <label class="text-[11px] font-extrabold bg-white/10 px-4 py-2 rounded-full border border-white/10" id="btn-bg-text" style="color: var(--text-color);">
                        更換圖片 <input type="file" id="bg-upload" accept="image/*" class="hidden">
                    </label>
                </div>
            </header>

            <main class="p-6 space-y-6">
                <section class="card-frosted p-10">
                    <p class="text-[11px] font-black text-center tracking-[0.4em] uppercase opacity-50 mb-8" style="color: var(--text-color);">JPY ⮕ TWD</p>
                    <input type="number" id="jpy" placeholder="0" inputmode="decimal">
                    <div class="text-center mt-8">
                        <div class="text-6xl font-black text-red-500 drop-shadow-2xl">NT$ <span id="twd">0</span></div>
                        <p id="rate-info" class="text-[10px] opacity-40 mt-5 italic font-medium" style="color: var(--text-color);"></p>
                    </div>
                </section>

                <div class="grid grid-cols-2 gap-4">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted p-7 flex flex-col items-center">
                        <i class="fa-solid fa-train-subway text-orange-400 text-3xl mb-4"></i>
                        <span class="font-bold text-xs opacity-90" style="color: var(--text-color);">交通查詢</span>
                    </a>
                    <a href="https://www.google.com/maps" target="_blank" class="card-frosted p-7 flex flex-col items-center">
                        <i class="fa-solid fa-map-location-dot text-blue-400 text-3xl mb-4"></i>
                        <span class="font-bold text-xs opacity-90" style="color: var(--text-color);">Google Map</span>
                    </a>
                </div>
            </main>
        </div>

        <div id="weather-page" class="page">
            <header class="p-8 pt-12 flex justify-between items-center">
                <h2 class="text-2xl font-black italic" style="color: var(--text-color);">天氣中心</h2>
                <button onclick="getGPS()" class="text-[11px] bg-white text-black font-extrabold px-5 py-2 rounded-full">更新位置</button>
            </header>
            <div class="p-6 space-y-6">
                <div class="card-frosted p-10">
                    <p id="g-city" class="text-xl font-bold mb-6" style="color: var(--text-color);">正在定位...</p>
                    <div class="flex justify-between items-end">
                        <p id="g-temp" class="text-8xl font-black tracking-tighter" style="color: var(--text-color);">--°</p>
                        <img id="g-icon" src="" class="w-28 h-28 -mr-6">
                    </div>
                    <p id="g-desc" class="text-sky-300 font-bold mt-4 text-lg">--</p>
                </div>
                <div class="space-y-4" id="city-list">
                    <div class="card-frosted p-6 flex justify-between items-center">
                        <span class="font-bold text-lg" style="color: var(--text-color);">東京 Tokyo</span>
                        <div class="flex items-center space-x-4">
                            <span id="t-Tokyo" class="text-3xl font-black" style="color: var(--text-color);">--°</span>
                            <img id="i-Tokyo" src="" class="w-12">
                        </div>
                    </div>
                    <div class="card-frosted p-6 flex justify-between items-center">
                        <span class="font-bold text-lg" style="color: var(--text-color);">大阪 Osaka</span>
                        <div class="flex items-center space-x-4">
                            <span id="t-Osaka" class="text-3xl font-black" style="color: var(--text-color);">--°</span>
                            <img id="i-Osaka" src="" class="w-12">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-8 left-0 right-0 z-50 px-10">
        <div class="tab-bar rounded-full p-2.5 flex justify-around items-center max-w-xs mx-auto shadow-2xl">
            <button onclick="showPage('home-page')" id="tab-home" class="flex-1 py-4 rounded-full text-white">
                <i class="fa-solid fa-plane-departure text-xl"></i>
            </button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="flex-1 py-4 rounded-full text-white/30">
                <i class="fa-solid fa-cloud-sun text-xl"></i>
            </button>
        </div>
    </footer>

    <script>
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 0.211;

        // --- 背景與智慧顏色分析 ---
        const bgUpload = document.getElementById('bg-upload');
        const savedBg = localStorage.getItem('user_bg_img');

        if (savedBg) applyBg(savedBg);

        bgUpload.addEventListener('change', e => {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = ev => {
                applyBg(ev.target.result);
                localStorage.setItem('user_bg_img', ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function applyBg(src) {
            document.documentElement.style.setProperty('--bg-img', `url(${src})`);
            const img = new Image();
            img.src = src;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const brightness = Math.sqrt(0.299*(r*r) + 0.587*(g*g) + 0.114*(b*b));
                const root = document.documentElement;
                
                if (brightness > 155) { // 亮色背景
                    root.style.setProperty('--text-color', '#111');
                    root.style.setProperty('--card-bg', 'rgba(0, 0, 0, 0.08)');
                    root.style.setProperty('--tab-bg', 'rgba(255, 255, 255, 0.9)');
                } else { // 暗色背景
                    root.style.setProperty('--text-color', '#fff');
                    root.style.setProperty('--card-bg', 'rgba(255, 255, 255, 0.12)');
                    root.style.setProperty('--tab-bg', 'rgba(0, 0, 0, 0.8)');
                }
            };
        }

        // --- 頁面邏輯 ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            const isHome = id === 'home-page';
            document.getElementById('tab-home').style.color = isHome ? '#fff' : 'rgba(255,255,255,0.3)';
            document.getElementById('tab-weather').style.color = isHome ? 'rgba(255,255,255,0.3)' : '#fff';
            
            if(id === 'weather-page') { updateCities(); getGPS(); }
        }

        async function updateRate() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/JPY');
                const d = await r.json();
                currentRate = d.rates.TWD;
                document.getElementById('rate-info').innerText = `LIVE: 1 JPY = ${currentRate.toFixed(4)} TWD`;
            } catch(e) {}
        }

        document.getElementById('jpy').oninput = e => {
            const val = e.target.value;
            document.getElementById('twd').innerText = val ? Math.round(val * currentRate).toLocaleString() : '0';
        };

        async function fetchWeather(city, tId, dId, iId, lat, lon) {
            let url = `https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${API_KEY}&lang=zh_tw&` + (lat ? `lat=${lat}&lon=${lon}` : `q=${city},JP`);
            try {
                const res = await fetch(url);
                const d = await res.json();
                const icon = `https://openweathermap.org/img/wn/${d.weather[0].icon}@4x.png`;
                const temp = Math.round(d.main.temp);
                
                if(lat) {
                    document.getElementById('g-city').innerText = d.name + ', ' + d.sys.country;
                    document.getElementById('g-temp').innerText = temp + '°';
                    document.getElementById('g-desc').innerText = d.weather[0].description;
                    document.getElementById('g-icon').src = icon;
                    // 同步鎖屏
                    document.getElementById('lock-w-icon').src = icon;
                    document.getElementById('lock-w-temp').innerText = temp + '°C';
                    document.getElementById('lock-w-desc').innerText = d.weather[0].description;
                    document.getElementById('lock-tz').innerText = `UTC${d.timezone/3600>=0?'+':''}${d.timezone/3600} | ${d.name}`;
                } else {
                    document.getElementById(tId).innerText = temp + '°';
                    document.getElementById(iId).src = icon;
                }
            } catch(e) {}
        }

        function updateCities() { fetchWeather('Tokyo', 't-Tokyo', '', 'i-Tokyo'); fetchWeather('Osaka', 't-Osaka', '', 'i-Osaka'); }
        function getGPS() { navigator.geolocation.getCurrentPosition(p => fetchWeather('', '', '', '', p.coords.latitude, p.coords.longitude)); }

        // --- 鎖屏切換 ---
        function toggleLockScreen() {
            const ls = document.getElementById('lock-screen');
            const isActive = ls.classList.toggle('active');
            if(isActive) {
                updateTime();
                document.getElementById('ui-layer').style.display = 'none';
                document.querySelector('footer').style.opacity = '0';
            } else {
                document.getElementById('ui-layer').style.display = 'block';
                document.querySelector('footer').style.opacity = '1';
            }
        }

        function updateTime() {
            const n = new Date();
            document.getElementById('lock-time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            document.getElementById('lock-date').innerText = `${n.getMonth()+1}月${n.getDate()}日 ${days[n.getDay()]}`;
        }
        setInterval(updateTime, 10000);

        updateRate();
        showPage('home-page');
    </script>
</body>
</html>
