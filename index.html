<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本自助助手 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; transition: opacity 0.3s ease; opacity: 0; }
        .page.active { display: block; opacity: 1; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .tab-bar-card { box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <div id="home-page" class="page active">
        <header class="bg-red-600 text-white p-6 text-center shadow-lg sticky top-0 z-10">
            <h1 class="text-2xl font-black italic tracking-tighter">JAPAN TRAVEL GO</h1>
        </header>

        <main class="p-6 space-y-6 pb-24">
            <section class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 transition-all hover:shadow-md">
                <p class="text-xs font-bold text-slate-400 mb-4 text-center italic tracking-widest">EXCHANGE RATE (JPY ⮕ TWD)</p>
                <div class="flex items-center space-x-3 mb-4">
                    <span class="text-3xl font-bold text-slate-300">¥</span>
                    <input type="number" id="jpy" class="w-full text-4xl font-bold outline-none border-b-2 border-slate-100 focus:border-red-500 text-center transition-colors" placeholder="0" inputmode="decimal">
                </div>
                <div class="flex flex-col items-center justify-center pt-2">
                    <span class="text-sm text-slate-400 mb-1">約等於</span>
                    <div class="text-5xl font-black text-red-600">NT$ <span id="twd">0</span></div>
                    <p id="rate-info" class="text-[10px] text-slate-300 mt-3 italic">載入最新匯率中...</p>
                </div>
            </section>

            <div class="grid grid-cols-2 gap-4">
                <a href="https://www.jorudan.co.jp/" target="_blank" class="bg-white text-slate-700 rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col items-center active:scale-95 transition-transform">
                    <i class="fa-solid fa-train-subway text-orange-500 text-3xl mb-3"></i>
                    <span class="font-bold text-sm">交通查詢</span>
                </a>
                <a href="https://www.google.com/maps" target="_blank" class="bg-white text-slate-700 rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col items-center active:scale-95 transition-transform">
                    <i class="fa-solid fa-map-location-dot text-blue-500 text-3xl mb-3"></i>
                    <span class="font-bold text-sm">Google Map</span>
                </a>
            </div>
        </main>
    </div>

    <div id="weather-page" class="page min-h-screen bg-slate-900 text-white">
        <header class="p-6 pb-2 flex justify-between items-center bg-slate-900/50 sticky top-0 z-10 backdrop-blur-md">
            <h2 class="text-xl font-black text-white italic"><i class="fa-solid fa-cloud mr-2"></i>天氣中心</h2>
            <button onclick="getGPS()" class="text-xs bg-white text-slate-900 font-bold px-4 py-1.5 rounded-full shadow-md active:scale-90 transition-transform">
                <i class="fa-solid fa-location-crosshairs mr-1"></i>全球定位
            </button>
        </header>

        <div class="p-6 space-y-6 pb-24">
            <div class="glass rounded-3xl p-6 shadow-xl border border-white/10 relative overflow-hidden">
                <div id="gps-icon-bg" class="absolute -right-10 -bottom-10 text-9xl text-white/5 opacity-50"></div>
                <div class="flex items-center space-x-2 mb-4">
                    <i class="fa-solid fa-location-dot text-sky-400"></i>
                    <p id="g-city" class="text-lg font-bold">載入位置中...</p>
                </div>
                <div class="flex items-end justify-between">
                    <div>
                        <p id="g-temp" class="text-7xl font-black tracking-tight">--°</p>
                        <p id="g-desc" class="text-sm font-medium text-sky-200">正在等待衛星信號...</p>
                    </div>
                    <img id="g-icon" src="" alt="" class="w-24 h-24 -mb-4 -mr-4">
                </div>
                <div id="g-details" class="mt-6 grid grid-cols-2 gap-x-6 gap-y-3 pt-6 border-t border-white/10 text-xs text-white/70 font-medium">
                    <p><i class="fa-solid fa-wind mr-1.5 w-4"></i>風向: --</p>
                    <p><i class="fa-solid fa-sun mr-1.5 w-4"></i>紫外線: --</p>
                    <p><i class="fa-solid fa-droplet mr-1.5 w-4"></i>濕度: --%</p>
                </div>
            </div>
