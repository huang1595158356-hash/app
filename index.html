<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本旅遊小助手 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        /* 優化手機點擊效果 */
        button, a { -webkit-tap-highlight-color: transparent; }
        body { -webkit-user-select: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="home" class="page active">
        <header class="bg-red-600 text-white p-6 text-center shadow-lg sticky top-0 z-10">
            <h1 class="text-2xl font-black italic tracking-tighter">JAPAN TRAVEL GO</h1>
        </header>

        <main class="p-6 space-y-6">
            <section class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                <p class="text-xs font-bold text-slate-400 mb-4 tracking-widest text-center italic">EXCHANGE RATE (JPY ⮕ TWD)</p>
                <div class="flex items-center space-x-3 mb-4">
                    <span class="text-3xl font-bold text-slate-300">¥</span>
                    <input type="number" id="jpy" class="w-full text-4xl font-bold outline-none border-b-2 border-slate-100 focus:border-red-500 transition-colors" placeholder="0" inputmode="decimal">
                </div>
                <div class="flex flex-col items-center justify-center pt-2">
                    <span class="text-sm text-slate-400 mb-1">約等於</span>
                    <div class="text-5xl font-black text-red-600">NT$ <span id="twd">0</span></div>
                    <p id="rate-info" class="text-[10px] text-slate-300 mt-3 italic">載入最新匯率中...</p>
                </div>
            </section>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="showWeather()" class="bg-sky-500 text-white rounded-3xl p-8 shadow-lg flex flex-col items-center active:scale-95 transition-transform">
                    <i class="fa-solid fa-cloud-sun text-4xl mb-3"></i>
                    <span class="font-bold tracking-wide">即時天氣</span>
                </button>
                
                <a href="https://www.jorudan.co.jp/" target="_blank" class="bg-white text-slate-700 rounded-3xl p-8 shadow-sm border border-slate-200 flex flex-col items-center active:scale-95 transition-transform">
                    <i class="fa-solid fa-train-subway text-orange-500 text-4xl mb-3"></i>
                    <span class="font-bold tracking-wide">交通查詢</span>
                </a>
                
                <a href="https://www.google.com/maps" target="_blank" class="bg-white text-slate-700 rounded-3xl p-8 shadow-sm border border-slate-200 flex flex-col items-center active:scale-95 transition-transform">
                    <i class="fa-solid fa-map-location-dot text-blue-500 text-4xl mb-3"></i>
                    <span class="font-bold tracking-wide">Google Map</span>
                </a>

                <a href="https://translate.google.com/?sl=zh-TW&tl=ja" target="_blank" class="bg-white text-slate-700 rounded-3xl p-8 shadow-sm border border-slate-200 flex flex-col items-center active:scale-95 transition-transform">
                    <i class="fa-solid fa-language text-green-500 text-4xl mb-3"></i>
                    <span class="font-bold tracking-wide">即時翻譯</span>
                </a>
            </div>
        </main>
    </div>

    <div id="weather" class="page min-h-screen bg-sky-600 text-white">
        <header class="p-6 flex items-center bg-sky-700/40 sticky top-0 z-10 backdrop-blur-md">
            <button onclick="showHome()" class="text-2xl mr-4 active:opacity-50 transition-opacity"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 class="text-xl font-bold italic tracking-wider">WEATHER CENTER</h2>
        </header>

        <div class="p-6 space-y-4">
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-6 border border-white/20 shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-bold tracking-widest"><i class="fa-solid fa-location-crosshairs mr-2"></i>CURRENT LOCATION</span>
                    <button onclick="getGPS()" class="bg-white text-sky-600 text-xs font-bold px-5 py-2 rounded-full shadow-lg active:scale-90 transition-transform">更新定位</button>
                </div>
                <div class="text-center py-4">
