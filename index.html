<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本旅遊助手</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 font-sans mb-10">

    <nav class="bg-red-600 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold italic"><i class="fa-solid fa-plane-departure mr-2"></i>Japan Travel Go</h1>
        <span id="update-time" class="text-[10px] opacity-80 text-right leading-none">更新中...</span>
    </nav>

    <main class="p-4 space-y-4">
        
        <section class="bg-gradient-to-br from-sky-500 to-blue-600 rounded-3xl shadow-lg p-6 text-white">
            <h2 class="text-xs font-bold opacity-80 uppercase mb-4 tracking-widest text-center">即時氣溫</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="text-center border-r border-white/20">
                    <p class="text-sm font-medium mb-1">大阪 (Osaka)</p>
                    <p class="text-4xl font-extrabold" id="temp-osaka">--°</p>
                    <p class="text-xs mt-1 bg-white/20 py-1 px-2 rounded-full inline-block" id="desc-osaka">讀取中...</p>
                </div>
                <div class="text-center">
                    <p class="text-sm font-medium mb-1">東京 (Tokyo)</p>
                    <p class="text-4xl font-extrabold" id="temp-tokyo">--°</p>
                    <p class="text-xs mt-1 bg-white/20 py-1 px-2 rounded-full inline-block" id="desc-tokyo">讀取中...</p>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm p-6 border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-gray-400 text-xs font-bold uppercase tracking-widest italic">JPY ⮕ TWD</h2>
                <span class="text-xs text-blue-500 font-bold" id="rate-display">匯率載入中...</span>
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <span class="absolute left-0 top-1/2 -translate-y-1/2 text-2xl font-bold text-slate-300">¥</span>
                    <input type="number" id="jpyInput" pattern="\d*" inputmode="decimal" 
                           class="w-full text-4xl font-bold border-b-2 border-slate-100 focus:border-red-500 outline-none py-2 pl-8" 
                           placeholder="0">
                </div>
                <div class="flex items-center text-slate-300">
                    <i class="fa-solid fa-chevron-down text-xl"></i>
                </div>
                <div class="flex items-baseline space-x-2">
                    <span class="text-xl font-bold text-red-600">NT$</span>
                    <span class="text-5xl font-black text-red-600" id="twdOutput">0</span>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4">
            <a href="https://www.jorudan.co.jp/" target="_blank" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center">
                <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center mb-2">
                    <i class="fa-solid fa-train-subway text-orange-500 text-xl"></i>
                </div>
                <span class="text-sm font-bold text-slate-700">乘換案內</span>
            </a>
            <a href="https://www.google.com/maps" target="_blank" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mb-2">
                    <i class="fa-solid fa-map-location-dot text-blue-500 text-xl"></i>
                </div>
                <span class="text-sm font-bold text-slate-700">Google Map</span>
            </a>
        </div>

    </main>

    <script>
        // --- 設定與初始化 ---
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6'; 
        let currentRate = 0.211; // 預設匯率

        // 1. 即時匯率 API (免 Key)
        async function updateRate() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/JPY');
                const data = await res.json();
                currentRate = data.rates.TWD;
                document.getElementById('rate-display').innerText = `1 JPY = ${currentRate.toFixed(4)} TWD`;
            } catch (e) {
                document.getElementById('rate-display').innerText = "匯率載入失敗 (離線中)";
            }
        }

        // 2. 匯率計算邏輯
        const jpyInput = document.getElementById('jpyInput');
        const twdOutput = document.getElementById('twdOutput');
        jpyInput.addEventListener('input', (e) => {
            const val = e.target.value;
            twdOutput.innerText = val ? Math.round(val * currentRate).toLocaleString() : '0';
        });

        // 3. 即時天氣 API
        async function fetchWeather(city, tempId, descId) {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city},JP&units=metric&appid=${API_KEY}&lang=zh_tw`);
                const data = await response.json();
                if(data.main) {
                    document.getElementById(tempId).innerText = `${Math.round(data.main.temp)}°`;
                    document.getElementById(descId).innerText = data.weather[0].description;
                    document.getElementById('update-time').innerHTML = `更新於<br>${new Date().toLocaleTimeString()}`;
                }
            } catch (error) {
                document.getElementById(descId).innerText = "API 載入中";
            }
        }

        // 啟動功能
        updateRate();
        fetchWeather('Osaka', 'temp-osaka', 'desc-osaka');
        fetchWeather('Tokyo', 'temp-tokyo', 'desc-tokyo');

        // PWA 支援
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
