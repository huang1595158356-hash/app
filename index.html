<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>旅遊工具 v5.5.2 - 雙向匯率版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --bg-img: none; --text-color: #ffffff; 
            --card-bg: rgba(18, 18, 18, 0.45); 
            --tab-bg: rgba(12, 12, 12, 0.92); 
            --accent: #0ea5e9;
        }
        body.light-mode { --text-color: #1a1a1a; --card-bg: rgba(255, 255, 255, 0.7); --tab-bg: rgba(255, 255, 255, 0.96); --accent: #0284c7; }
        
        body, html { height: 100%; margin: 0; overflow: hidden; background: #000; max-width: 500px; margin: 0 auto; color: var(--text-color); font-family: "Inter", "PingFang TC", sans-serif; transition: all 0.4s ease; }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--bg-img); background-size: cover; background-position: center; z-index: 1; filter: brightness(0.8); transition: 0.6s ease; transform: scale(1.02); }
        .content-layer { position: relative; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; }
        
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; overflow-y: auto; padding-top: env(safe-area-inset-top); padding-bottom: 140px; }
        .page.active { display: flex; animation: slideIn 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-frosted { 
            background: var(--card-bg) !important; 
            backdrop-filter: blur(55px) saturate(180%) brightness(110%) !important;
            -webkit-backdrop-filter: blur(55px) saturate(180%) brightness(110%) !important;
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 30px; 
            margin-bottom: 20px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.25);
        }

        #lock-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; 
            background: rgba(0,0,0,0.5); display: none; flex-direction: column; padding: 100px 40px; 
            backdrop-filter: blur(70px); -webkit-backdrop-filter: blur(70px); 
        }
        #lock-screen.active { display: flex; }

        .tab-bar { background: var(--tab-bg); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); z-index: 150; }
        .nav-btn.active { color: var(--accent); }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        input { border: none; background: transparent; outline: none; text-align: right; }
        .vertical-text { writing-mode: vertical-rl; text-orientation: mixed; }
    </style>
</head>
<body class="dark-mode">
    <div class="bg-layer" id="main-bg"></div>

    <div id="lock-screen" onclick="toggleLockScreen()">
        <div class="flex justify-between items-start w-full">
            <div class="flex flex-col">
                <p id="lock-time" class="text-7xl font-black text-white tracking-tighter leading-none">00:00</p>
                <div class="flex items-center gap-3 mt-4">
                    <span class="bg-sky-500 text-white text-[10px] px-2 py-0.5 font-black rounded italic">SYNCED</span>
                    <p id="lock-date" class="text-lg font-bold text-white/60">同步中...</p>
                </div>
            </div>
            <div class="vertical-text text-white/10 font-black tracking-widest text-xs uppercase italic">Travel Intelligence</div>
        </div>
        <div class="mt-auto w-full">
            <div class="card-frosted p-8 border-l-4 border-sky-500">
                <div class="flex justify-between items-end">
                    <div>
                        <p id="lock-city" class="text-[10px] font-black opacity-40 mb-1 uppercase tracking-widest italic italic">Local Forecast</p>
                        <p id="lock-w-desc" class="text-xl font-black text-white">點擊進入系統</p>
                    </div>
                    <div id="lock-w-icon-box" class="text-5xl mb-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-layer">
        <div id="home-page" class="page active">
            <header class="p-8 pt-14 flex justify-between items-center">
                <h1 class="text-3xl font-black italic tracking-tighter">旅遊工具</h1>
                <div class="flex items-center space-x-2">
                    <button onclick="toggleLockScreen()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 active:scale-90"><i class="fa-solid fa-expand"></i></button>
                    <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 active:scale-90"><i class="fa-solid fa-circle-half-stroke"></i></button>
                    <label class="text-[10px] font-black bg-white/5 px-4 py-3 rounded-full border border-white/10 cursor-pointer">背景<input type="file" id="bg-upload" accept="image/*" class="hidden"></label>
                </div>
            </header>
            
            <main class="px-6">
                <section class="card-frosted p-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-sky-500"></div>
                    <p class="text-[10px] font-black tracking-[0.5em] opacity-30 mb-8 uppercase text-center">雙向匯率換算 (TWD ↔ JPY)</p>
                    
                    <div class="space-y-6">
                        <div class="flex items-center justify-between border-b border-white/5 pb-4">
                            <span class="text-lg font-black italic opacity-40">TWD</span>
                            <div class="flex items-center">
                                <span class="text-2xl font-black mr-2 text-sky-500">¥</span>
                                <input type="number" id="twd-input" placeholder="0" inputmode="decimal" class="text-4xl font-black w-full text-white">
                            </div>
                        </div>
                        <div class="flex items-center justify-between pt-2">
                            <span class="text-lg font-black italic opacity-40">JPY</span>
                            <div class="flex items-center">
                                <span class="text-2xl font-black mr-2 text-sky-500">¥</span>
                                <input type="number" id="jpy-input" placeholder="0" inputmode="decimal" class="text-4xl font-black w-full text-white">
                            </div>
                        </div>
                    </div>
                    
                    <p id="rate-info" class="text-[9px] opacity-30 mt-8 font-bold uppercase tracking-widest text-center italic">Loading Market Data...</p>
                </section>

                <div class="grid grid-cols-2 gap-4 mt-2">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted p-8 flex flex-col items-center">
                        <i class="fa-solid fa-route text-orange-400 text-2xl mb-3"></i>
                        <span class="font-bold text-[10px] uppercase">乘換案內</span>
                    </a>
                    <a href="https://www.google.com/maps" target="_blank" class="card-frosted p-8 flex flex-col items-center">
                        <i class="fa-solid fa-location-crosshairs text-blue-400 text-2xl mb-3"></i>
                        <span class="font-bold text-[10px] uppercase">地圖導航</span>
                    </a>
                </div>
            </main>
        </div>

        <div id="weather-page" class="page">
            <header class="p-8 pt-14 flex justify-between items-center">
                <h2 class="text-2xl font-black italic tracking-widest text-sky-500">氣象數據</h2>
                <button onclick="fetchAllWeather()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 active:rotate-180 transition-transform"><i class="fa-solid fa-arrows-rotate"></i></button>
            </header>
            <div id="weather-content" class="px-6 pb-24 space-y-4"></div>
        </div>
    </div>

    <footer class="fixed bottom-10 left-0 right-0 z-[150] px-10">
        <div class="tab-bar rounded-2xl p-2.5 flex justify-around items-center max-w-[260px] mx-auto shadow-2xl">
            <button onclick="showPage('home-page')" id="tab-home" class="nav-btn active flex-1 py-4 transition-all"><i class="fa-solid fa-compass text-xl"></i></button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="nav-btn opacity-30 flex-1 py-4 transition-all"><i class="fa-solid fa-wind text-xl"></i></button>
        </div>
    </footer>

    <script>
        const API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 4.75; // 1 TWD to JPY

        function getWindDir(deg) { const arr = ["北","東北","東","東南","南","西南","西","西北"]; return arr[Math.round(deg/45)%8]; }
        
        async function fetchAllWeather() {
            const container = document.getElementById('weather-content');
            container.innerHTML = `<div class="p-4 opacity-40 text-xs italic animate-pulse">大氣數據同步中...</div>`;
            navigator.geolocation.getCurrentPosition(async p => {
                const { latitude: lat, longitude: lon } = p.coords;
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${API_KEY}&lat=${lat}&lon=${lon}&lang=zh_tw`);
                const d = await res.json();
                
                let html = generateWeatherCard(d.name, d, "目前位置", true);
                const jpCities = [{q:'Tokyo', n:'東京'}, {q:'Osaka', n:'大阪'}, {q:'Kyoto', n:'京都'}];
                for(let city of jpCities) {
                    try {
                        const rc = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city.q}&units=metric&appid=${API_KEY}&lang=zh_tw`);
                        const dc = await rc.json();
                        html += generateWeatherCard(city.n, dc, "日本重點城市", false);
                    } catch(e) {}
                }
                container.innerHTML = html;
                document.getElementById('lock-city').innerText = d.name;
                document.getElementById('lock-w-desc').innerText = `${d.weather[0].description} ${Math.round(d.main.temp)}°C`;
                document.getElementById('lock-w-icon-box').innerHTML = getWeatherIcon(d.weather[0].icon);
            });
        }

        function generateWeatherCard(title, d, label, isMain = false) {
            const windKmH = (d.wind.speed * 3.6).toFixed(1);
            return `<div class="card-frosted p-6 ${isMain ? 'border-l-4 border-sky-500' : ''}">
                <div class="flex justify-between items-start">
                    <div><span class="text-[9px] font-black bg-white/10 px-2 py-0.5 rounded uppercase tracking-tighter">${label}</span><p class="text-lg font-black mt-1 tracking-tight">${title}</p></div>
                    <div class="text-3xl filter drop-shadow-md">${getWeatherIcon(d.weather[0].icon)}</div>
                </div>
                <div class="flex items-end gap-3 mt-4">
                    <span class="text-5xl font-black">${Math.round(d.main.temp)}°</span>
                    <div class="flex flex-col mb-1"><span class="text-xs font-bold opacity-40">${d.weather[0].description}</span><span class="text-[10px] font-bold text-sky-400">體感 ${Math.round(d.main.feels_like)}°</span></div>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-6 pt-4 border-t border-white/5">
                    <div class="text-center"><p class="text-[9px] font-black opacity-30">風速 (km/h)</p><p class="text-xs font-bold">${getWindDir(d.wind.deg)} ${windKmH}</p></div>
                    <div class="text-center border-x border-white/5"><p class="text-[9px] font-black opacity-30">濕度</p><p class="text-xs font-bold">${d.main.humidity}%</p></div>
                    <div class="text-center"><p class="text-[9px] font-black opacity-30">降雨機率</p><p class="text-xs font-bold text-sky-400">${d.clouds.all}%</p></div>
                </div>
            </div>`;
        }

        function getWeatherIcon(code) {
            const isNight = code.endsWith('n'), c = code.substring(0, 2);
            switch(c) {
                case '01': return isNight ? '🌙' : '☀️';
                case '02': return '⛅';
                case '03': case '04': return '☁️';
                case '09': case '10': return '🌧️';
                case '13': return '❄️';
                default: return '🌫️';
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('opacity-30'));
            document.getElementById(id).classList.add('active');
            const btnId = id === 'home-page' ? 'tab-home' : 'tab-weather';
            document.getElementById(btnId).classList.remove('opacity-30');
            document.getElementById(btnId).classList.add('active');
            if(id === 'weather-page') fetchAllWeather();
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function toggleLockScreen() { document.getElementById('lock-screen').classList.toggle('active'); updateTime(); }
        
        function updateTime() {
            const n = new Date();
            document.getElementById('lock-time').innerText = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
            const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            document.getElementById('lock-date').innerText = `${n.getMonth()+1}月${n.getDate()}日 ${days[n.getDay()]}`;
        }

        async function updateRate() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/TWD'); const d = await r.json();
                currentRate = d.rates.JPY; 
                document.getElementById('rate-info').innerText = `Exchange: 1 TWD = ${currentRate.toFixed(4)} JPY`;
            } catch(e) {}
        }

        // 雙向匯率邏輯
        const twdIn = document.getElementById('twd-input');
        const jpyIn = document.getElementById('jpy-input');

        twdIn.oninput = () => {
            if (twdIn.value === "") { jpyIn.value = ""; return; }
            jpyIn.value = Math.round(twdIn.value * currentRate);
        };
        jpyIn.oninput = () => {
            if (jpyIn.value === "") { twdIn.value = ""; return; }
            twdIn.value = Math.round(jpyIn.value / currentRate);
        };

        document.getElementById('bg-upload').onchange = e => {
            const reader = new FileReader(); 
            reader.onload = () => { document.getElementById('main-bg').style.backgroundImage = `url(${reader.result})`; };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        };

        setInterval(updateTime, 1000); updateRate(); updateTime(); fetchAllWeather();
    </script>
</body>
</html>
