<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>旅遊工具 v6.2 - 精簡穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --bg-img: none; --text-color: #ffffff; 
            --card-bg: rgba(18, 18, 18, 0.45); 
            --tab-bg: rgba(12, 12, 12, 0.92); 
            --accent: #0ea5e9;
        }
        body.light-mode { --text-color: #1a1a1a; --card-bg: rgba(255, 255, 255, 0.7); --tab-bg: rgba(255, 255, 255, 0.96); --accent: #0284c7; }
        
        body, html { height: 100%; margin: 0; overflow: hidden; background: #000; max-width: 500px; margin: 0 auto; color: var(--text-color); font-family: "SF Pro Display", "Inter", "PingFang TC", "Microsoft JhengHei", sans-serif; transition: all 0.4s ease; }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--bg-img); background-size: cover; background-position: center; z-index: 1; filter: brightness(0.8); transition: 0.6s ease; transform: scale(1.02); }
        .content-layer { position: relative; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; }
        
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; overflow-y: auto; padding-top: env(safe-area-inset-top); padding-bottom: 140px; }
        .page.active { display: flex; animation: slideIn 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-frosted { 
            background: var(--card-bg) !important; 
            backdrop-filter: blur(55px) saturate(180%) brightness(110%) !important;
            -webkit-backdrop-filter: blur(55px) saturate(180%) brightness(110%) !important;
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 30px; 
            margin-bottom: 20px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.25);
        }

        .tab-bar { background: var(--tab-bg); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); z-index: 150; }
        .nav-btn.active { color: var(--accent); }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        input { border: none; background: transparent; outline: none; text-align: right; color: inherit; }
    </style>
</head>
<body class="dark-mode">
    <div class="bg-layer" id="main-bg"></div>

    <div class="content-layer">
        <!-- 主頁面：匯率功能 -->
        <div id="home-page" class="page active">
            <header class="p-8 pt-14 flex justify-between items-center">
                <h1 class="text-3xl font-black italic tracking-tighter">旅遊助手</h1>
                <div class="flex items-center space-x-2">
                    <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 active:scale-90"><i class="fa-solid fa-circle-half-stroke"></i></button>
                    <label class="text-[10px] font-black bg-white/5 px-4 py-3 rounded-full border border-white/10 cursor-pointer">更換壁紙<input type="file" id="bg-upload" accept="image/*" class="hidden"></label>
                </div>
            </header>
            
            <main class="px-6">
                <!-- 匯率轉換卡片 -->
                <section class="card-frosted p-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-sky-500"></div>
                    <p class="text-[11px] font-black tracking-[0.5em] opacity-30 mb-8 uppercase text-center">雙向即時匯率換算</p>
                    
                    <div class="space-y-6">
                        <div class="flex items-center justify-between border-b border-white/5 pb-4">
                            <span class="text-lg font-black italic opacity-50">TWD</span>
                            <div class="flex items-center">
                                <span class="text-2xl font-black mr-2 text-sky-500">¥</span>
                                <input type="number" id="twd-input" placeholder="0" inputmode="decimal" class="text-4xl font-black w-full">
                            </div>
                        </div>
                        <div class="flex items-center justify-between pt-2">
                            <span class="text-lg font-black italic opacity-50">JPY</span>
                            <div class="flex items-center">
                                <span class="text-2xl font-black mr-2 text-sky-500">¥</span>
                                <input type="number" id="jpy-input" placeholder="0" inputmode="decimal" class="text-4xl font-black w-full">
                            </div>
                        </div>
                    </div>
                    
                    <p id="rate-info" class="text-[10px] opacity-30 mt-8 font-bold uppercase tracking-widest text-center">正在抓取最新市場行情...</p>
                </section>

                <!-- 導航快捷鍵 -->
                <div class="grid grid-cols-2 gap-4 mt-2">
                    <a href="https://www.jorudan.co.jp/" target="_blank" class="card-frosted p-8 flex flex-col items-center">
                        <i class="fa-solid fa-train-subway text-orange-400 text-2xl mb-3"></i>
                        <span class="font-bold text-[11px] uppercase tracking-wider">交通查詢</span>
                    </a>
                    <a href="https://www.google.com/maps" target="_blank" class="card-frosted p-8 flex flex-col items-center">
                        <i class="fa-solid fa-map-location-dot text-blue-400 text-2xl mb-3"></i>
                        <span class="font-bold text-[11px] uppercase tracking-wider">地圖導航</span>
                    </a>
                </div>
            </main>
        </div>

        <!-- 天氣資訊頁面 -->
        <div id="weather-page" class="page">
            <header class="p-8 pt-14 flex justify-between items-center">
                <h2 class="text-2xl font-black italic tracking-widest text-sky-500">目的地天氣</h2>
                <button onclick="fetchAllWeather()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 active:rotate-180 transition-transform"><i class="fa-solid fa-arrows-rotate"></i></button>
            </header>
            <div id="weather-content" class="px-6 pb-24 space-y-4"></div>
        </div>
    </div>

    <!-- 底部導覽列 -->
    <footer class="fixed bottom-10 left-0 right-0 z-[150] px-10">
        <div class="tab-bar rounded-2xl p-2.5 flex justify-around items-center max-w-[260px] mx-auto shadow-2xl">
            <button onclick="showPage('home-page')" id="tab-home" class="nav-btn active flex-1 py-4 transition-all"><i class="fa-solid fa-wallet text-xl"></i></button>
            <button onclick="showPage('weather-page')" id="tab-weather" class="nav-btn opacity-30 flex-1 py-4 transition-all"><i class="fa-solid fa-cloud-sun text-xl"></i></button>
        </div>
    </footer>

    <script>
        const WEATHER_API_KEY = '25a54155dd027a7abd3f8c19a521a5f6';
        let currentRate = 4.75; 

        // 城市名稱翻譯
        const cityNames = { 'Tokyo': '東京', 'Osaka': '大阪', 'Kyoto': '京都', 'Taipei': '台北', 'Chaozhou': '潮州' };

        // 風向判斷
        function getWindDir(deg) { 
            const arr = ["北","東北","東","東南","南","西南","西","西北"]; 
            return arr[Math.round(deg/45)%8]; 
        }
        
        // 抓取所有天氣資訊
        async function fetchAllWeather() {
            const container = document.getElementById('weather-content');
            container.innerHTML = `<div class="p-8 opacity-40 text-sm italic animate-pulse text-center">連線中...</div>`;
            
            navigator.geolocation.getCurrentPosition(async p => {
                const { latitude: lat, longitude: lon } = p.coords;
                try {
                    // 抓取當前位置天氣
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${WEATHER_API_KEY}&lat=${lat}&lon=${lon}&lang=zh_tw`);
                    const d = await res.json();
                    
                    let html = generateWeatherCard(cityNames[d.name] || d.name, d, "當前位置", true);
                    
                    // 抓取日本預設城市天氣
                    const jpCities = [{q:'Tokyo', n:'東京'}, {q:'Osaka', n:'大阪'}, {q:'Kyoto', n:'京都'}];
                    for(let city of jpCities) {
                        try {
                            const rc = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city.q}&units=metric&appid=${WEATHER_API_KEY}&lang=zh_tw`);
                            const dc = await rc.json();
                            html += generateWeatherCard(city.n, dc, "日本熱門城市", false);
                        } catch(e) {}
                    }
                    container.innerHTML = html;
                } catch(e) {
                    container.innerHTML = `<div class="p-8 text-center opacity-50">連線錯誤，請檢查網路</div>`;
                }
            }, () => {
                container.innerHTML = `<div class="p-8 text-center opacity-50">無法獲取定位授權</div>`;
            });
        }

        // 生成天氣卡片 HTML
        function generateWeatherCard(title, d, label, isMain = false) {
            const windKmH = (d.wind.speed * 3.6).toFixed(1);
            return `<div class="card-frosted p-6 ${isMain ? 'border-l-4 border-sky-500' : ''}">
                <div class="flex justify-between items-start">
                    <div><span class="text-[10px] font-black bg-white/10 px-2.5 py-1 rounded tracking-wider">${label}</span><p class="text-xl font-black mt-2">${title}</p></div>
                    <div class="text-4xl">${getWeatherIcon(d.weather[0].icon)}</div>
                </div>
                <div class="flex items-end gap-3 mt-4">
                    <span class="text-6xl font-black">${Math.round(d.main.temp)}°</span>
                    <div class="flex flex-col mb-1.5"><span class="text-sm font-bold opacity-50">${d.weather[0].description}</span><span class="text-[11px] font-bold text-sky-400">體感 ${Math.round(d.main.feels_like)}°</span></div>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-8 pt-6 border-t border-white/5">
                    <div class="text-center"><p class="text-[10px] opacity-30 mb-1">風向風速</p><p class="text-xs font-bold">${getWindDir(d.wind.deg)} ${windKmH}k/h</p></div>
                    <div class="text-center border-x border-white/5"><p class="text-[10px] opacity-30 mb-1">環境濕度</p><p class="text-xs font-bold">${d.main.humidity}%</p></div>
                    <div class="text-center"><p class="text-[10px] opacity-30 mb-1">雲量</p><p class="text-xs font-bold text-sky-400">${d.clouds.all}%</p></div>
                </div>
            </div>`;
        }

        // 天氣圖示對應
        function getWeatherIcon(code) {
            const isNight = code.endsWith('n'), c = code.substring(0, 2);
            switch(c) {
                case '01': return isNight ? '🌙' : '☀️';
                case '02': return '⛅';
                case '03': case '04': return '☁️';
                case '09': case '10': return '🌧️';
                case '11': return '⛈️';
                case '13': return '❄️';
                default: return '🌫️';
            }
        }

        // 頁面切換
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { 
                b.classList.add('opacity-30'); 
                b.classList.remove('active'); 
            });
            document.getElementById(id).classList.add('active');
            const btnId = id === 'home-page' ? 'tab-home' : 'tab-weather';
            document.getElementById(btnId).classList.remove('opacity-30');
            document.getElementById(btnId).classList.add('active');
            if(id === 'weather-page') fetchAllWeather();
        }

        // 主題切換
        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        // 抓取匯率
        async function updateRate() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/TWD'); 
                const d = await r.json();
                currentRate = d.rates.JPY; 
                document.getElementById('rate-info').innerText = `1 TWD ≈ ${currentRate.toFixed(4)} JPY (市場參考價)`;
            } catch(e) {}
        }

        // 匯率輸入邏輯
        const twdIn = document.getElementById('twd-input');
        const jpyIn = document.getElementById('jpy-input');
        twdIn.oninput = () => { if (twdIn.value === "") jpyIn.value = ""; else jpyIn.value = Math.round(twdIn.value * currentRate); };
        jpyIn.oninput = () => { if (jpyIn.value === "") twdIn.value = ""; else twdIn.value = Math.round(jpyIn.value / currentRate); };

        // 背景圖片上傳
        document.getElementById('bg-upload').onchange = e => {
            const reader = new FileReader(); 
            reader.onload = () => { document.getElementById('main-bg').style.backgroundImage = `url(${reader.result})`; };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        };

        // 初始化
        updateRate(); 
        fetchAllWeather();
    </script>
</body>
</html>
